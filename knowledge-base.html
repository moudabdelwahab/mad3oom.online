<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاعدة المعرفة - منصة مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="/assets/js/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        .kb-wrapper {
            display: flex;
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            min-height: calc(100vh - 200px);
        }

        /* ==================== Sidebar ==================== */
        .kb-sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .kb-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2.5rem 2rem;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            border-radius: 1.5rem;
            color: white;
            box-shadow: var(--shadow-lg);
            grid-column: 1 / -1;
        }

        .kb-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .kb-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .search-container {
            margin-bottom: 2rem;
            grid-column: 1 / -1;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(0, 119, 204, 0.1);
        }

        .kb-categories {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 20px;
        }

        .kb-categories-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--color-text);
            border-left: 3px solid transparent;
        }

        .category-item:hover {
            background: var(--color-muted);
            border-left-color: var(--color-accent);
        }

        .category-item.active {
            background: rgba(0, 119, 204, 0.1);
            color: var(--color-accent);
            border-left-color: var(--color-accent);
            font-weight: 600;
        }

        .category-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== Main Content ==================== */
        .kb-main {
            flex: 1;
            min-width: 0;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .article-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 1.2rem;
            padding: 1.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .article-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-accent), var(--color-primary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .article-card:hover {
            transform: translateY(-8px);
            border-color: var(--color-accent);
            box-shadow: var(--shadow-lg);
        }

        .article-card:hover::before {
            transform: scaleX(1);
        }

        .article-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 119, 204, 0.1);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            font-size: 1.5rem;
        }

        .article-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-text);
            line-height: 1.4;
        }

        .article-excerpt {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            flex-grow: 1;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
        }

        .article-category-tag {
            display: inline-block;
            padding: 0.3rem 0.75rem;
            background: rgba(0, 119, 204, 0.1);
            color: var(--color-accent);
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
        }

        /* ==================== Modal ==================== */
        .kb-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: fadeIn 0.3s ease;
        }

        .kb-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--color-surface);
            width: 100%;
            max-width: 850px;
            max-height: 90vh;
            border-radius: 1.5rem;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            color: white;
            padding: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            z-index: 10;
        }

        .modal-header-content h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .modal-header-content .category-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .close-modal {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2.5rem;
        }

        .kb-content h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            color: var(--color-primary);
        }

        .kb-content h3:first-child {
            margin-top: 0;
        }

        .kb-content p {
            margin-bottom: 1rem;
            line-height: 1.8;
            color: var(--color-text);
        }

        .kb-content ul, .kb-content ol {
            margin-bottom: 1.5rem;
            padding-right: 1.5rem;
        }

        .kb-content li {
            margin-bottom: 0.75rem;
            color: var(--color-text);
            line-height: 1.6;
        }

        .kb-content strong {
            color: var(--color-primary);
            font-weight: 700;
        }

        .tip-box {
            background: rgba(0, 119, 204, 0.05);
            border-left: 4px solid var(--color-accent);
            padding: 1.2rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
        }

        .tip-box strong {
            color: var(--color-accent);
        }

        .warning-box {
            background: rgba(224, 168, 0, 0.05);
            border-left: 4px solid var(--color-warning);
            padding: 1.2rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
        }

        .warning-box strong {
            color: var(--color-warning);
        }

        /* ==================== Empty State ==================== */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--color-text-secondary);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* ==================== Responsive ==================== */
        @media (max-width: 1024px) {
            .kb-wrapper {
                flex-direction: column;
                gap: 1.5rem;
            }

            .kb-sidebar {
                width: 100%;
            }

            .kb-categories {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                padding: 1rem;
            }

            .category-item {
                justify-content: center;
                text-align: center;
            }
        }

        @media (max-width: 768px) {
            .articles-grid {
                grid-template-columns: 1fr;
            }

            .modal-header {
                padding: 1.5rem;
            }

            .modal-body {
                padding: 1.5rem;
            }

            .kb-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <main class="admin-main">
        <div class="kb-header">
            <h1>قاعدة المعرفة</h1>
            <p>مجموعة شاملة من الدروس والمقالات التعليمية لمساعدتك في الاستفادة القصوى من منصة مدعوم</p>
        </div>

        <div class="search-container" style="max-width: 1400px; margin: -1.5rem auto 2rem; padding: 0 1.5rem; position: relative; z-index: 5;">
            <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن مقال (مثال: كلمة المرور، تسجيل الدخول، الأمان...)">
        </div>

        <div class="kb-wrapper">
            <!-- Sidebar -->
            <aside class="kb-sidebar">
                <div class="kb-categories">
                    <div class="kb-categories-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        التصنيفات
                    </div>
                    <div class="category-item active" onclick="filterByCategory('all')">
                        <span class="category-icon">📋</span>
                        جميع المقالات
                    </div>
                    <div class="category-item" onclick="filterByCategory('security')">
                        <span class="category-icon">🔒</span>
                        الأمان والحساب
                    </div>
                    <div class="category-item" onclick="filterByCategory('general')">
                        <span class="category-icon">❓</span>
                        مساعدة عامة
                    </div>
                    <div class="category-item" onclick="filterByCategory('features')">
                        <span class="category-icon">⚙️</span>
                        الميزات والأدوات
                    </div>
                    <div class="category-item" onclick="filterByCategory('troubleshooting')">
                        <span class="category-icon">🔧</span>
                        استكشاف الأخطاء
                    </div>
                    <div class="category-item" onclick="filterByCategory('chat')">
                        <span class="category-icon">💬</span>
                        الدردشة والدعم
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="kb-main">
                <div class="articles-grid" id="articlesContainer">
                    <!-- Articles will be inserted here -->
                </div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                    <p>لم نجد أي مقالات تطابق بحثك</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Article Modal -->
    <div id="articleModal" class="kb-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-content">
                    <h2 id="modalTitle"></h2>
                    <div class="category-badge" id="modalCategory"></div>
                </div>
                <button class="close-modal" onclick="closeArticle()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalContent" class="kb-content"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initCustomerSidebar } from './assets/js/customer-sidebar.js';
        import { initSidebar as initAdminSidebar } from './assets/js/admin/sidebar.js';
        import { supabase } from './supabase-client.js';

        // Initialize Sidebar
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            const isAdmin = user.email.includes('admin') || user.user_metadata?.role === 'admin';
            if (isAdmin) initAdminSidebar();
            else initCustomerSidebar();
        }

        // Articles Database
        const articles = [
            // ==================== Security & Account ====================
            {
                id: 'password-check',
                title: 'كيف تتأكد من قوة كلمة المرور وحالة الأحرف؟',
                category: 'security',
                icon: '🔐',
                excerpt: 'تعرف على كيفية اختيار كلمة مرور قوية وآمنة وأهمية حالة الأحرف في تسجيل الدخول.',
                content: `
                    <h3>تأمين حسابك بكلمة مرور قوية</h3>
                    <p>كلمة المرور هي خط الدفاع الأول لحماية بياناتك الشخصية والمهمة. إليك دليل شامل لاختيار وإدارة كلمة مرور آمنة:</p>
                    
                    <h3>حالة الأحرف (Case Sensitivity)</h3>
                    <p>منصة مدعوم تميز بين الأحرف الكبيرة (A) والصغيرة (a). هذا يعني:</p>
                    <ul>
                        <li><strong>MyPassword123</strong> مختلفة عن <strong>mypassword123</strong></li>
                        <li>تأكد من إيقاف مفتاح "Caps Lock" قبل الكتابة</li>
                        <li>إذا واجهت مشكلة في تسجيل الدخول، تحقق من حالة الأحرف أولاً</li>
                    </ul>

                    <h3>معايير كلمة مرور قوية</h3>
                    <ul>
                        <li><strong>الطول:</strong> لا تقل عن 8 أحرف (يفضل 12 أو أكثر)</li>
                        <li><strong>التنوع:</strong> استخدم مزيجاً من:
                            <ul>
                                <li>أحرف كبيرة (A, B, C)</li>
                                <li>أحرف صغيرة (a, b, c)</li>
                                <li>أرقام (0-9)</li>
                                <li>رموز خاصة (@, #, $, %, &)</li>
                            </ul>
                        </li>
                        <li><strong>تجنب:</strong> تاريخ ميلادك، اسمك، أو كلمات قاموسية شهيرة</li>
                    </ul>

                    <div class="tip-box">
                        <strong>💡 نصيحة:</strong> استخدم عبارة سهلة التذكر ثم أضف أرقاماً ورموزاً. مثال: "مدعوم2024@آمن" تجمع بين سهولة التذكر والأمان.
                    </div>

                    <h3>إذا نسيت كلمة المرور</h3>
                    <p>لا تقلق! يمكنك استعادة حسابك بسهولة:</p>
                    <ol>
                        <li>اذهب إلى صفحة تسجيل الدخول</li>
                        <li>انقر على "نسيت كلمة المرور"</li>
                        <li>أدخل بريدك الإلكتروني المسجل</li>
                        <li>ستصلك رسالة تفعيل على بريدك</li>
                        <li>اتبع الرابط وأنشئ كلمة مرور جديدة</li>
                    </ol>
                `
            },
            {
                id: 'email-verify',
                title: 'التحقق من صحة البريد الإلكتروني',
                category: 'security',
                icon: '📧',
                excerpt: 'خطوات للتأكد من أن بريدك الإلكتروني صحيح ومفعل لاستلام الإشعارات.',
                content: `
                    <h3>لماذا يجب أن يكون بريدك الإلكتروني صحيحاً؟</h3>
                    <p>نستخدم بريدك الإلكتروني لعدة أغراض مهمة:</p>
                    <ul>
                        <li>إرسال إشعارات المحادثات الجديدة</li>
                        <li>تقارير الأداء والإحصائيات</li>
                        <li>روابط استعادة كلمة المرور</li>
                        <li>تحديثات الحساب والأمان</li>
                    </ul>

                    <h3>كيفية التحقق من صحة البريد</h3>
                    <ol>
                        <li>اذهب إلى إعدادات حسابك</li>
                        <li>ابحث عن قسم "البريد الإلكتروني"</li>
                        <li>تأكد من عدم وجود مسافات قبل أو بعد البريد</li>
                        <li>تحقق من النطاق (Domain) - مثلاً: gmail.com وليس gmal.com</li>
                        <li>انقر على "إرسال رسالة تحقق" إذا لم تكن قد تحققت بعد</li>
                    </ol>

                    <h3>الأخطاء الشائعة</h3>
                    <ul>
                        <li><strong>مسافات زائدة:</strong> " example@gmail.com " مختلفة عن "example@gmail.com"</li>
                        <li><strong>نقاط في الاسم:</strong> "john.doe@gmail.com" مختلفة عن "johndoe@gmail.com"</li>
                        <li><strong>أحرف صغيرة/كبيرة:</strong> البريد الإلكتروني غير حساس لحالة الأحرف عادة</li>
                    </ul>

                    <div class="warning-box">
                        <strong>⚠️ تحذير:</strong> إذا لم تتحقق من بريدك، قد لا تستقبل رسائل مهمة. تأكد من التحقق فوراً.
                    </div>

                    <h3>إذا لم تستقبل رسالة التحقق</h3>
                    <ol>
                        <li>تحقق من مجلد الرسائل غير المرغوب فيها (Spam)</li>
                        <li>أضف بريدنا (support@mad3oom.online) إلى جهات الاتصال الموثوقة</li>
                        <li>انتظر 5 دقائق وحاول مرة أخرى</li>
                        <li>إذا استمرت المشكلة، تواصل مع فريق الدعم</li>
                    </ol>
                `
            },
            {
                id: 'two-factor',
                title: 'تفعيل المصادقة الثنائية (2FA)',
                category: 'security',
                icon: '🔑',
                excerpt: 'طبقة أمان إضافية لحماية حسابك من الوصول غير المصرح به.',
                content: `
                    <h3>ما هي المصادقة الثنائية؟</h3>
                    <p>المصادقة الثنائية (2FA) توفر طبقة أمان إضافية لحسابك. بدلاً من استخدام كلمة المرور فقط، ستحتاج إلى تأكيد إضافي:</p>
                    <ul>
                        <li>كلمة المرور الخاصة بك</li>
                        <li>رمز من هاتفك (تطبيق أو رسالة نصية)</li>
                    </ul>

                    <h3>كيفية تفعيل 2FA</h3>
                    <ol>
                        <li>اذهب إلى "الإعدادات" > "الأمان"</li>
                        <li>انقر على "تفعيل المصادقة الثنائية"</li>
                        <li>اختر الطريقة المفضلة:
                            <ul>
                                <li><strong>تطبيق المصادقة:</strong> Google Authenticator أو Microsoft Authenticator</li>
                                <li><strong>رسالة نصية:</strong> رمز يصل إلى هاتفك</li>
                            </ul>
                        </li>
                        <li>اتبع التعليمات على الشاشة</li>
                        <li>احفظ رموز النسخ الاحتياطية في مكان آمن</li>
                    </ol>

                    <div class="tip-box">
                        <strong>💡 نصيحة:</strong> احفظ الرموز الاحتياطية في ملف آمن. إذا فقدت هاتفك، ستحتاج إليها للوصول إلى حسابك.
                    </div>
                `
            },

            // ==================== General Help ====================
            {
                id: 'first-steps',
                title: 'خطواتك الأولى في منصة مدعوم',
                category: 'general',
                icon: '🚀',
                excerpt: 'دليل شامل للمستخدمين الجدد للتعرف على واجهة المنصة.',
                content: `
                    <h3>أهلاً بك في مدعوم!</h3>
                    <p>صممنا هذه المنصة لتكون سهلة الاستخدام وقوية في نفس الوقت. إليك كيف تبدأ رحلتك:</p>

                    <h3>1. لوحة التحكم (Dashboard)</h3>
                    <p>هنا يمكنك متابعة كل شيء في لمحة واحدة:</p>
                    <ul>
                        <li>ملخص نشاطك الأخير</li>
                        <li>المحادثات الجديدة</li>
                        <li>الإحصائيات والتقارير</li>

        // Render Articles
        function renderArticles(filter = 'all', search = '') {
            const container = document.getElementById('articlesContainer');
            const emptyState = document.getElementById('emptyState');
            
            let filtered = articles.filter(article => {
                const categoryMatch = filter === 'all' || article.category === filter;
                const searchMatch = search === '' || 
                    article.title.includes(search) || 
                    article.excerpt.includes(search) ||
                    article.category.includes(search);
                return categoryMatch && searchMatch;
            });

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                container.innerHTML = filtered.map(article => `
                    <div class="article-card" onclick="openArticle('${article.id}')">
                        <div class="article-icon">${article.icon}</div>
                        <h3 class="article-title">${article.title}</h3>
                        <p class="article-excerpt">${article.excerpt}</p>
                        <div class="article-meta">
                            <span class="article-category-tag">${getCategoryName(article.category)}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function getCategoryName(category) {
            const names = {
                'security': 'الأمان والحساب',
                'general': 'مساعدة عامة',
                'features': 'الميزات والأدوات',
                'troubleshooting': 'استكشاف الأخطاء',
                'chat': 'الدردشة والدعم'
            };
            return names[category] || category;
        }

        window.filterByCategory = function(category) {
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.category-item').classList.add('active');
            renderArticles(category, document.getElementById('searchInput').value);
        };

        window.openArticle = function(id) {
            const article = articles.find(a => a.id === id);
            if (article) {
                document.getElementById('modalTitle').textContent = article.title;
                document.getElementById('modalCategory').textContent = getCategoryName(article.category);
                document.getElementById('modalContent').innerHTML = article.content;
                document.getElementById('articleModal').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeArticle = function() {
            document.getElementById('articleModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        document.getElementById('articleModal').onclick = function(e) {
            if (e.target === this) closeArticle();
        };

        document.getElementById('searchInput').oninput = function(e) {
            const activeCategory = document.querySelector('.category-item.active');
            const category = activeCategory?.textContent.includes('جميع') ? 'all' : 
                           activeCategory?.textContent.includes('الأمان') ? 'security' :
                           activeCategory?.textContent.includes('عامة') ? 'general' :
                           activeCategory?.textContent.includes('الميزات') ? 'features' :
                           activeCategory?.textContent.includes('استكشاف') ? 'troubleshooting' :
                           activeCategory?.textContent.includes('الدردشة') ? 'chat' : 'all';
            renderArticles(category, e.target.value);
        };

        renderArticles();
    </script>
