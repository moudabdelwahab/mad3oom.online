<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإحصائيات - لوحة الإدارة</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/robot.css">
    <link rel="stylesheet" href="/assets/js/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>

    <main class="admin-main">
        <header class="page-header">
            <h1>إحصائيات النظام</h1>
            <p>تحليل شامل للبيانات والنشاطات في لوحة الإدارة</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: #E3F2FD; color: #1976D2;">📈</div>
                <div class="stat-info">
                    <h3>إجمالي التذاكر</h3>
                    <div class="stat-value" id="totalTickets">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #FFF3E0; color: #F57C00;">⏳</div>
                <div class="stat-info">
                    <h3>تذاكر مفتوحة</h3>
                    <div class="stat-value" id="openTickets">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #E8F5E9; color: #2E7D32;">✅</div>
                <div class="stat-info">
                    <h3>تذاكر مكتملة</h3>
                    <div class="stat-value" id="resolvedTickets">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #F3E5F5; color: #7B1FA2;">👥</div>
                <div class="stat-info">
                    <h3>إجمالي المستخدمين</h3>
                    <div class="stat-value" id="totalUsers">0</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/assets/js/admin/stats.js"></script>
</body>
</html>
