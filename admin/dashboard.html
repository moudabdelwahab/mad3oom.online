<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - لوحة الإدارة</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/robot.css">
    <link rel="stylesheet" href="/assets/js/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div id="sidebar-container"></div>

    <main class="admin-main">
        <header class="page-header">
            <h1>نظرة عامة</h1>
            <p>مرحباً بك في لوحة تحكم الإدارة - ملخص نشاط النظام</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: #E3F2FD; color: #1976D2;">📊</div>
                <div class="stat-info">
                    <h3>إجمالي التذاكر</h3>
                    <div class="stat-value" id="admTotal">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #FFF3E0; color: #F57C00;">⏳</div>
                <div class="stat-info">
                    <h3>تذاكر مفتوحة</h3>
                    <div class="stat-value" id="admOpen">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #E8F5E9; color: #2E7D32;">✅</div>
                <div class="stat-info">
                    <h3>تذاكر مكتملة</h3>
                    <div class="stat-value" id="admResolved">0</div>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">آخر التذاكر المستلمة</h2>
                <a href="tickets.html" class="btn btn-secondary btn-sm">عرض كل التذاكر</a>
            </div>
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>المستخدم</th>
                            <th>عنوان التذكرة</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="admTicketsBody">
                        <tr><td colspan="5" style="text-align: center; padding: 3rem;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="/assets/js/admin/dashboard.js"></script>
</body>
</html>
