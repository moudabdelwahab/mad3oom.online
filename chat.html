<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثة الفورية - منصة مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --chat-bg: #f0f2f5;
            --message-sent: var(--color-primary);
            --message-received: #ffffff;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--chat-bg); margin: 0; }
        .chat-page-container {
            max-width: 1000px;
            margin: 1rem auto;
            padding: 0 15px;
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
        }
        .chat-window {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
        }
        .chat-header {
            background: var(--color-primary);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-user-info { display: flex; align-items: center; gap: 1rem; }
        .chat-avatar {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            padding: 5px;
        }
        .chat-messages {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
        }
        .message.sent {
            align-self: flex-end;
            background: var(--color-primary);
            color: white;
            border-bottom-left-radius: 0.2rem;
        }
        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-right-radius: 0.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.3rem;
            display: block;
        }
        .chat-input-area {
            padding: 1rem 1.5rem;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .chat-input {
            flex-grow: 1;
            border: 1px solid #ddd;
            padding: 0.8rem 1.2rem;
            border-radius: 2rem;
            outline: none;
            font-family: inherit;
        }
        .send-btn {
            background: var(--color-primary);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); }
        .typing-indicator {
            font-size: 0.8rem;
            color: #666;
            padding: 0.5rem 1.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar" style="background: white; padding: 0.5rem 2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <div class="nav-container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="nav-logo" style="display: flex; align-items: center; gap: 0.5rem;">
                <img src="/assets/images/logo.png" alt="Logo" style="height: 40px;">
                <span style="font-weight: 800; color: var(--color-primary);">منصة مدعوم</span>
            </div>
            <a href="/customer-dashboard.html" style="text-decoration: none; color: #666; font-weight: 600;">العودة للوحة التحكم</a>
        </div>
    </nav>

    <main class="chat-page-container">
        <div class="chat-window">
            <div class="chat-header">
                <div class="chat-user-info">
                    <img src="/assets/images/mad3oom-robot.png" alt="مدعوم" class="chat-avatar">
                    <div>
                        <h3 style="margin: 0; font-size: 1rem;">بوت مدعوم الذكي</h3>
                        <span style="font-size: 0.75rem; opacity: 0.9;">متصل الآن - رد تلقائي</span>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- الرسائل ستظهر هنا ديناميكياً -->
            </div>

            <div id="typingIndicator" class="typing-indicator">البوت يكتب الآن...</div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" placeholder="اكتب رسالتك هنا..." id="chatInput">
                <button class="send-btn" id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(180deg);">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="/assets/js/chat-logic.js"></script>
</body>
</html>
