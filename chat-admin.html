<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثة الفورية - منصة مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --chat-bg: #f4f7f6;
            --sidebar-width: 280px;
            --header-height: 70px;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--chat-bg); 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
        }
        
        /* Layout Structure */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar Styling */
        .control-sidebar {
            width: var(--sidebar-width);
            background: white;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .sidebar-menu {
            flex-grow: 1;
            padding: 1rem 0;
            overflow-y: auto;
        }

        .menu-item {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #555;
            font-weight: 600;
            border-right: 4px solid transparent;
        }

        .menu-item:hover {
            background: #f8f9fa;
            color: var(--color-primary);
        }

        .menu-item.active {
            background: #eef2ff;
            color: var(--color-primary);
            border-right-color: var(--color-primary);
        }

        .menu-icon {
            width: 24px;
            height: 24px;
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #f0f2f5;
            overflow: hidden;
            height: 100%;
        }

        /* Navbar Styling */
        .top-navbar {
            height: var(--header-height);
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-logo-area img { height: 40px; }
        .nav-logo-area span { font-weight: 800; color: var(--color-primary); font-size: 1.2rem; }

        /* View Containers */
        .view-container {
            flex-grow: 1;
            display: none;
            padding: 2rem;
            overflow: hidden;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .view-container.active { display: flex; }

        /* Chat Window Styling (Matching User's Image) */
        .chat-wrapper {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            position: relative;
            z-index: 20;
        }

        .chat-header-blue {
            background: #003366; /* Dark Blue from Image */
            color: white;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            z-index: 30;
        }

        .bot-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bot-avatar-circle {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .bot-avatar-circle img { width: 100%; height: 100%; object-fit: contain; }

        .chat-body {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
            position: relative;
            z-index: 25;
        }

        /* Message Bubbles */
        .msg {
            max-width: 75%;
            padding: 0.9rem 1.25rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .msg.sent {
            align-self: flex-end;
            background: var(--color-primary);
            color: white;
            border-bottom-left-radius: 0.2rem;
        }

        .msg.received {
            align-self: flex-start;
            background: #f1f0f0;
            color: #333;
            border-bottom-right-radius: 0.2rem;
        }

        .chat-footer {
            padding: 1.25rem 2rem;
            background: #ffffff !important;
            border-top: 1px solid #eee;
            display: flex;
            gap: 1rem;
            align-items: center;
            position: relative;
            z-index: 50;
            flex-shrink: 0;
            pointer-events: auto !important;
        }

        .input-box {
            flex-grow: 1;
            border: 1px solid var(--color-border) !important;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            outline: none;
            font-family: inherit;
            background: var(--color-surface) !important;
            color: var(--color-text) !important;
            position: relative;
            z-index: 60;
            pointer-events: auto !important;
            cursor: text;
        }
        .input-box:focus {
            border-color: var(--color-accent) !important;
        }

        .action-btn {
            background: #003366;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            position: relative;
            z-index: 60;
        }

        /* Settings UI Styling */
        .settings-form {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-row { margin-bottom: 1.5rem; }
        .form-row label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        
        /* Sessions List Styling */
        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .session-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #eee;
        }

        .session-card:hover { transform: translateY(-3px); border-color: var(--color-primary); }
        .session-card.active { border: 2px solid var(--color-primary); background: #f0f7ff; }

        /* Responsive */
        @media (max-width: 992px) {
            .control-sidebar { width: 80px; }
            .menu-item span { display: none; }
            .menu-item { justify-content: center; padding: 1.5rem 0; }
        }

        footer {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Menu (Admin Only Control) -->
        <aside class="control-sidebar" id="mainSidebar" style="display: none;">
            <div class="sidebar-header">
                <img src="/assets/images/logo.png" alt="Logo" style="height: 40px;">
            </div>
            <div class="sidebar-menu">
                <div class="menu-item active" data-target="customer-chats">
                    <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>محادثات العملاء</span>
                </div>
                <div class="menu-item" data-target="bot-settings">
                    <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    <span>إعدادات البوت</span>
                </div>
                <div class="menu-item" data-target="bot-test">
                    <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <span>تجربة البوت</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <!-- Navbar -->
            <nav class="top-navbar">
                <div class="nav-logo-area">
                    <img src="/assets/images/logo.png" alt="Logo">
                    <span>منصة مدعوم</span>
                </div>
                <div class="nav-actions">
                    <a href="/admin-dashboard.html" style="text-decoration: none; color: #666; font-weight: 600;">العودة للوحة التحكم</a>
                </div>
            </nav>

            <!-- Customer Chats View -->
            <div id="customer-chats-view" class="view-container active">
                <div class="sessions-grid" id="sessionsList">
                    <!-- Session cards will be loaded here -->
                    <div style="text-align: center; grid-column: 1/-1; padding: 3rem; color: #666;">
                        جاري تحميل المحادثات...
                    </div>
                </div>
            </div>

            <!-- Bot Settings View -->
            <div id="bot-settings-view" class="view-container">
                <form class="settings-form" id="botSettingsForm">
                    <div class="section-title">إعدادات ردود البوت</div>
                    <div class="form-row">
                        <label>اسم البوت</label>
                        <input type="text" class="form-input" id="botName" placeholder="مثال: بوت مدعوم الذكي">
                    </div>
                    <div class="form-row">
                        <label>الرسالة الترحيبية</label>
                        <textarea class="form-input" id="welcomeMsg" rows="3" placeholder="الرسالة التي تظهر عند بدء المحادثة"></textarea>
                    </div>
                    <div class="form-row">
                        <label>تعليمات البوت (System Prompt)</label>
                        <textarea class="form-input" id="systemPrompt" rows="6" placeholder="كيف يجب أن يتصرف البوت؟"></textarea>
                    </div>
                    <button type="submit" class="action-btn" style="width: auto; border-radius: 8px; padding: 0 2rem;">حفظ الإعدادات</button>
                </form>
            </div>

            <!-- Bot Test View (Chat Window) -->
            <div id="bot-test-view" class="view-container">
                <div class="chat-wrapper">
                    <div class="chat-header-blue">
                        <div class="bot-profile">
                            <div class="bot-avatar-circle">
                                <img src="/assets/images/mad3oom-robot.png" alt="Bot" id="chatHeaderImg">
                            </div>
                            <div>
                                <h3 style="margin: 0; font-size: 1.1rem;" id="chatHeaderName">بوت مدعوم الذكي</h3>
                                <span style="font-size: 0.8rem; opacity: 0.8;" id="chatHeaderStatus">متصل الآن - رد تلقائي</span>
                            </div>
                        </div>
                        <button id="closeChatBtn" style="background: none; border: none; color: white; cursor: pointer; display: none;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                        </button>
                    </div>

                    <div class="chat-body" id="chatMessages">
                        <!-- Messages -->
                    </div>

                    <div id="typingIndicator" style="padding: 0.5rem 2rem; font-size: 0.8rem; color: #666; display: none;">جاري الرد...</div>

                    <div class="chat-footer">
                        <input type="text" class="input-box" placeholder="اكتب رسالتك هنا..." id="chatInput" autocomplete="off">
                        <button class="action-btn" id="sendBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(180deg);"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/assets/js/admin/sidebar.js"></script>
    <script type="module" src="/assets/js/chat-logic.js"></script>
</body>
</html>
