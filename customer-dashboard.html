<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة العميل - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
    <style>
        .profile-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-sm);
            margin-top: 2rem;
        }
        .profile-form {
            display: grid;
            gap: 1.5rem;
            max-width: 600px;
        }
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .nav-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.3s;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .nav-tab:hover {
            background: var(--hover-bg);
            color: var(--primary-color);
        }
        .nav-tab.active {
            background: var(--primary-color);
            color: white;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .dashboard-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--color-surface);
            color: var(--color-text);
            padding: 2.5rem;
            border-radius: 1.25rem;
            width: 100%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-border);
        }
        .close {
            position: absolute;
            left: 1.25rem;
            top: 1.25rem;
            font-size: 1.75rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            line-height: 1;
            transition: color 0.2s;
        }
        .close:hover {
            color: var(--color-danger);
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--color-text);
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--color-border);
            background: var(--input-bg);
            color: var(--input-text);
            font-family: inherit;
            font-size: 1rem;
        }
        
        .ticket-item {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .ticket-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            border-color: var(--primary-color);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-open { background: rgba(224, 168, 0, 0.15); color: var(--warning-color); }
        .status-in-progress { background: rgba(0, 119, 204, 0.15); color: var(--primary-color); }
        .status-resolved { background: rgba(46, 138, 58, 0.15); color: var(--success-color); }
        
        .image-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin-top: 1rem;
            border-radius: 0.5rem;
            display: none;
            border: 1px solid var(--border-color);
        }

        /* تحسينات الردود */
        .replies-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }
        .reply-item {
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            background: var(--hover-bg);
        }
        .reply-item.admin {
            background: rgba(0, 119, 204, 0.05);
            border-right: 4px solid var(--primary-color);
        }
        .reply-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="logo.svg" alt="Logo" class="logo-image">
                <span>لوحة العميل</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <ul class="nav-menu">
                    <li id="welcomeUser" style="color: var(--color-nav-text); font-weight: 500;"></li>
                    <li><a href="#" id="profileLink">الملف الشخصي</a></li>
                    <li><a href="#" id="signOutLink">تسجيل الخروج</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 2rem; max-width: 1200px; margin-left: auto; margin-right: auto; padding: 0 1rem;">
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="tickets">تذاكري</div>
            <div class="nav-tab" data-tab="profile">الملف الشخصي</div>
        </div>

        <!-- قسم التذاكر -->
        <div id="ticketsTab" class="tab-content active">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>تذاكري</h1>
                <button class="btn btn-primary" id="openCreateTicket">إنشاء تذكرة جديدة</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-content">
                        <p class="stat-label">إجمالي التذاكر</p>
                        <p class="stat-value" id="userTotalTickets">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-content">
                        <p class="stat-label">قيد المعالجة</p>
                        <p class="stat-value" id="userInProgressTickets" style="color: var(--primary-color);">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-content">
                        <p class="stat-label">المحلولة</p>
                        <p class="stat-value" id="userResolvedTickets" style="color: var(--success-color);">0</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-controls">
                <div class="search-box">
                    <input type="text" id="ticketSearch" placeholder="بحث في تذاكري...">
                </div>
                <div class="filter-group" style="display: flex; gap: 0.5rem;">
                    <select id="statusFilter" class="form-control" style="width: auto;">
                        <option value="all">كل الحالات</option>
                        <option value="open">مفتوحة</option>
                        <option value="in-progress">قيد المعالجة</option>
                        <option value="resolved">محلولة</option>
                    </select>
                </div>
            </div>

            <div id="userTicketsList" class="tickets-list" style="margin-top: 1rem;">
                <div style="text-align:center; padding: 3rem; color: var(--text-secondary);">جاري تحميل التذاكر...</div>
            </div>
        </div>

        <!-- قسم البروفايل -->
        <div id="profileTab" class="tab-content">
            <div class="profile-section">
                <h2>إعدادات الملف الشخصي</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">تعديل بياناتك الشخصية</p>
                
                <div id="profileMessage" class="message-box" style="display: none; margin-bottom: 1rem; padding: 1rem; border-radius: 0.5rem;"></div>

                <form id="profileForm" class="profile-form">
                    <div class="form-group">
                        <label for="profileFullName">الاسم الكامل</label>
                        <input type="text" id="profileFullName" class="form-control" placeholder="أدخل اسمك الكامل">
                    </div>
                    <div class="form-group">
                        <label for="profileEmail">البريد الإلكتروني</label>
                        <input type="email" id="profileEmail" class="form-control" readonly disabled>
                        <small style="color: var(--text-secondary);">لا يمكن تغيير البريد الإلكتروني حالياً</small>
                    </div>
                    <div class="form-group">
                        <label for="profilePhone">رقم الهاتف</label>
                        <input type="tel" id="profilePhone" class="form-control" placeholder="أدخل رقم هاتفك">
                    </div>
                    <div class="form-group">
                        <label for="profilePassword">كلمة المرور الجديدة</label>
                        <input type="password" id="profilePassword" class="form-control" placeholder="اتركها فارغة إذا لا تريد التغيير">
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveProfileBtn" style="width: fit-content; padding: 0.75rem 2rem;">حفظ التغييرات</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Create Ticket Modal -->
    <div id="userTicketModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeUserTicketModal">&times;</span>
            <h2>إنشاء تذكرة جديدة</h2>
            <form id="userCreateTicketForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label for="userTicketTitle">العنوان</label>
                    <input type="text" id="userTicketTitle" class="form-control" required placeholder="عنوان المشكلة">
                </div>
                <div class="form-group">
                    <label for="userTicketDescription">الوصف</label>
                    <textarea id="userTicketDescription" class="form-control" rows="4" required placeholder="اشرح المشكلة بالتفصيل"></textarea>
                </div>
                <div class="form-group">
                    <label for="userTicketPriority">الأولوية</label>
                    <select id="userTicketPriority" class="form-control" required>
                        <option value="low">منخفضة</option>
                        <option value="medium" selected>متوسطة</option>
                        <option value="high">عالية</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="userTicketImage">إرفاق صورة (اختياري)</label>
                    <input type="file" id="userTicketImage" class="form-control" accept="image/*">
                    <img id="imagePreview" class="image-preview">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('userTicketModal').classList.remove('active')">إلغاء</button>
                    <button type="submit" class="btn btn-primary" id="submitTicketBtn">إنشاء التذكرة</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Ticket Details Modal -->
    <div id="ticketDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeDetailsModal">&times;</span>
            <div id="ticketDetailsContent">
                <!-- سيتم ملؤه برمجياً -->
            </div>
            
            <div class="replies-container">
                <h3>الردود</h3>
                <div id="repliesList" style="margin-top: 1rem;">
                    <!-- سيتم ملؤه برمجياً -->
                </div>
                
                <form id="addReplyForm" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <textarea id="replyMessage" class="form-control" rows="3" required placeholder="اكتب ردك هنا..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitReplyBtn">إرسال الرد</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { requireAuth, logout, updateProfile } from './auth-client.js';
        import { 
            fetchUserTickets, 
            createTicket, 
            fetchTicketStats, 
            uploadTicketImage, 
            subscribeToTickets,
            fetchTicketReplies,
            addTicketReply
        } from './tickets-service.js';

        let currentUser;
        let activeTicketId = null;

        // 1. حماية الصفحة وتحميل البيانات
        async function init() {
            try {
                currentUser = await requireAuth('customer');
                if (!currentUser) {
                    window.location.replace('sign-in.html');
                    return;
                }

                document.getElementById('welcomeUser').textContent = `مرحباً، ${currentUser.profile?.full_name || currentUser.email}`;
                document.getElementById('profileEmail').value = currentUser.email;
                document.getElementById('profileFullName').value = currentUser.profile?.full_name || '';
                document.getElementById('profilePhone').value = currentUser.profile?.phone || '';

                await loadDashboardData();
            } catch (err) {
                console.error('Init error:', err);
                window.location.replace('sign-in.html');
            }
        }

        // 2. تحميل البيانات
        async function loadDashboardData() {
            const list = document.getElementById('userTicketsList');
            try {
                const stats = await fetchTicketStats();
                document.getElementById('userTotalTickets').textContent = stats.total || 0;
                document.getElementById('userInProgressTickets').textContent = stats.inProgress || 0;
                document.getElementById('userResolvedTickets').textContent = stats.resolved || 0;

                const search = document.getElementById('ticketSearch').value;
                const status = document.getElementById('statusFilter').value;
                
                const tickets = await fetchUserTickets({ search, status });
                list.innerHTML = '';

                if (!tickets || tickets.length === 0) {
                    list.innerHTML = '<div style="text-align:center; padding: 3rem; color: var(--text-secondary);">لا توجد تذاكر حالياً</div>';
                } else {
                    tickets.forEach(t => {
                        const div = document.createElement('div');
                        div.className = 'ticket-item';
                        div.onclick = () => openTicketDetails(t);
                        div.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                                <h3 style="margin:0;">${t.title}</h3>
                                <span class="status-badge status-${t.status}">${getStatusLabel(t.status)}</span>
                            </div>
                            <p style="color: var(--text-secondary); margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${t.description}</p>
                            <div style="font-size: 0.85rem; color: var(--text-secondary); display: flex; gap: 1rem;">
                                <span>الأولوية: ${getPriorityLabel(t.priority)}</span>
                                <span>التاريخ: ${new Date(t.created_at).toLocaleDateString('ar-EG')}</span>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
            } catch (err) {
                list.innerHTML = '<div style="text-align:center; padding: 3rem; color: var(--danger-color);">حدث خطأ أثناء تحميل التذاكر</div>';
            }
        }

        function getStatusLabel(status) {
            const labels = { 'open': 'مفتوحة', 'in-progress': 'قيد المعالجة', 'resolved': 'محلولة' };
            return labels[status] || status;
        }

        function getPriorityLabel(priority) {
            const labels = { 'high': 'عالية', 'medium': 'متوسطة', 'low': 'منخفضة' };
            return labels[priority] || priority;
        }

        // 3. تفاصيل التذكرة والردود
        async function openTicketDetails(ticket) {
            activeTicketId = ticket.id;
            const modal = document.getElementById('ticketDetailsModal');
            const content = document.getElementById('ticketDetailsContent');
            
            content.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
                    <h2 style="margin:0;">${ticket.title}</h2>
                    <span class="status-badge status-${ticket.status}">${getStatusLabel(ticket.status)}</span>
                </div>
                <div style="background: var(--hover-bg); padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1.5rem;">
                    <p style="white-space: pre-wrap; margin-bottom: 1.5rem;">${ticket.description}</p>
                    ${ticket.image_url ? `<a href="${ticket.image_url}" target="_blank"><img src="${ticket.image_url}" style="max-width:100%; border-radius:0.5rem; border: 1px solid var(--border-color);"></a>` : ''}
                </div>
                <div style="font-size: 0.9rem; color: var(--text-secondary); display: flex; gap: 1.5rem;">
                    <span><strong>الأولوية:</strong> ${getPriorityLabel(ticket.priority)}</span>
                    <span><strong>التاريخ:</strong> ${new Date(ticket.created_at).toLocaleString('ar-EG')}</span>
                </div>
            `;

            modal.classList.add('active');
            await loadReplies(ticket.id);
        }

        async function loadReplies(ticketId) {
            const list = document.getElementById('repliesList');
            list.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">جاري تحميل الردود...</p>';
            
            try {
                const replies = await fetchTicketReplies(ticketId);
                list.innerHTML = '';
                
                if (!replies || replies.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color: var(--text-secondary); padding: 1rem;">لا توجد ردود بعد</p>';
                } else {
                    replies.forEach(r => {
                        const profile = r.profiles;
                        const isAdmin = profile?.role === 'admin';
                        const div = document.createElement('div');
                        div.className = `reply-item ${isAdmin ? 'admin' : ''}`;
                        div.innerHTML = `
                            <div class="reply-meta">
                                <strong>${profile?.full_name || 'مستخدم'} ${isAdmin ? '(الدعم الفني)' : ''}</strong>
                                <span>${new Date(r.created_at).toLocaleString('ar-EG')}</span>
                            </div>
                            <div class="reply-text" style="white-space: pre-wrap;">${r.message}</div>
                        `;
                        list.appendChild(div);
                    });
                }
                list.scrollTop = list.scrollHeight;
            } catch (err) {
                list.innerHTML = '<p style="color: var(--danger-color);">فشل تحميل الردود</p>';
            }
        }

        // 4. الأحداث (Events)
        document.getElementById('addReplyForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!activeTicketId) return;

            const btn = document.getElementById('submitReplyBtn');
            const msgInput = document.getElementById('replyMessage');
            
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';

            try {
                await addTicketReply(activeTicketId, msgInput.value);
                msgInput.value = '';
                await loadReplies(activeTicketId);
            } catch (err) {
                alert('فشل إرسال الرد: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'إرسال الرد';
            }
        };

        document.getElementById('userCreateTicketForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitTicketBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الإنشاء...';

            try {
                let image_url = null;
                const imageFile = document.getElementById('userTicketImage').files[0];
                
                if (imageFile) {
                    try {
                        image_url = await uploadTicketImage(imageFile);
                    } catch (uploadErr) {
                        if (!confirm('فشل رفع الصورة. هل تريد الاستمرار بدون صورة؟\nالسبب: ' + uploadErr.message)) {
                            throw new Error('تم إلغاء العملية');
                        }
                    }
                }

                await createTicket({
                    title: document.getElementById('userTicketTitle').value,
                    description: document.getElementById('userTicketDescription').value,
                    priority: document.getElementById('userTicketPriority').value,
                    image_url
                });

                document.getElementById('userTicketModal').classList.remove('active');
                document.getElementById('userCreateTicketForm').reset();
                document.getElementById('imagePreview').style.display = 'none';
                await loadDashboardData();
            } catch (err) {
                if (err.message !== 'تم إلغاء العملية') alert('خطأ: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'إنشاء التذكرة';
            }
        };

        // تبديل التبويبات
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
            });
        });

        // إغلاق المودال
        document.getElementById('closeDetailsModal').onclick = () => document.getElementById('ticketDetailsModal').classList.remove('active');
        document.getElementById('closeUserTicketModal').onclick = () => document.getElementById('userTicketModal').classList.remove('active');
        document.getElementById('openCreateTicket').onclick = () => document.getElementById('userTicketModal').classList.add('active');

        // البحث والفلترة
        document.getElementById('ticketSearch').oninput = () => loadDashboardData();
        document.getElementById('statusFilter').onchange = () => loadDashboardData();

        // معاينة الصورة
        document.getElementById('userTicketImage').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const preview = document.getElementById('imagePreview');
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // تسجيل الخروج
        document.getElementById('signOutLink').onclick = async (e) => {
            e.preventDefault();
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                await logout();
                window.location.href = 'sign-in.html';
            }
        };

        // تحديث البروفايل
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            const msg = document.getElementById('profileMessage');
            btn.disabled = true;
            
            try {
                const updates = {
                    full_name: document.getElementById('profileFullName').value,
                    phone: document.getElementById('profilePhone').value,
                    updated_at: new Date()
                };
                
                const { error } = await updateProfile(updates);
                if (error) throw error;

                const password = document.getElementById('profilePassword').value;
                if (password) {
                    const { error: pError } = await import('./auth-client.js').then(m => m.updatePassword(password));
                    if (pError) throw pError;
                }

                msg.style.display = 'block';
                msg.style.background = 'rgba(46, 138, 58, 0.1)';
                msg.style.color = 'var(--success-color)';
                msg.textContent = 'تم تحديث البيانات بنجاح';
                document.getElementById('welcomeUser').textContent = `مرحباً، ${updates.full_name}`;
            } catch (err) {
                msg.style.display = 'block';
                msg.style.background = 'rgba(217, 83, 79, 0.1)';
                msg.style.color = 'var(--danger-color)';
                msg.textContent = err.message;
            } finally {
                btn.disabled = false;
            }
        };

        // تشغيل
        init();
        subscribeToTickets(() => loadDashboardData());
    </script>
</body>
</html>
