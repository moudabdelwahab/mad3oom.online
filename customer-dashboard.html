<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة العميل - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
    <style>
        .profile-section {
            background: var(--color-surface);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-sm);
            margin-top: 2rem;
        }
        .profile-form {
            display: grid;
            gap: 1.5rem;
            max-width: 600px;
        }
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 0.5rem;
            overflow-x: auto;
        }
        .nav-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.3s;
            font-weight: 600;
            color: var(--color-text-secondary);
            white-space: nowrap;
        }
        .nav-tab:hover {
            background: var(--hover-bg);
            color: var(--color-accent);
        }
        .nav-tab.active {
            background: var(--color-accent);
            color: white;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--color-surface);
            padding: 2.5rem;
            border-radius: 1.25rem;
            width: 100%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: var(--shadow);
            border: 1px solid var(--color-border);
        }
        .close {
            position: absolute;
            left: 1.25rem;
            top: 1.25rem;
            font-size: 1.75rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            line-height: 1;
        }
        
        .wallet-info {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--color-muted);
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .wallet-info:hover {
            background: var(--color-accent);
            color: white;
        }
        .wallet-tooltip {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--color-surface);
            color: var(--color-text);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--color-border);
            margin-top: 0.5rem;
            white-space: nowrap;
            z-index: 100;
        }
        .wallet-info:hover .wallet-tooltip {
            display: block;
        }

        .impersonation-banner {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #f87171;
        }
    </style>
</head>
<body>
    <div id="impersonationBanner" class="impersonation-banner" style="display: none;">
        أنت تتصفح الآن كعميل (وضع التمثيل للمسؤولين)
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="/assets/images/logo.png" alt="Logo" class="logo-image">
                <span>لوحة العميل</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>

                <div class="wallet-info" id="walletBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                        <path d="M12 12h.01"></path>
                    </svg>
                    <span id="pointsCount">0</span>
                    <div class="wallet-tooltip">رصيدك الحالي: <strong id="pointsTooltip">0</strong> نقطة</div>
                </div>

                <div class="notification-wrapper" style="position: relative; display: flex; align-items: center;">
                    <button id="notificationBtn" class="notification-btn" style="background: none; border: 1px solid var(--color-border); border-radius: 0.5rem; padding: 0.5rem; cursor: pointer; color: var(--color-text); display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span id="notificationBadge" style="display: none; position: absolute; top: -5px; right: -5px; background: var(--color-danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--color-surface);">0</span>
                    </button>
                    <div id="notificationDropdown" style="display: none; position: absolute; top: 100%; left: 0; width: 300px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 0.5rem; box-shadow: var(--shadow); z-index: 1001; margin-top: 0.5rem; max-height: 400px; overflow-y: auto;">
                        <div style="padding: 1rem; border-bottom: 1px solid var(--color-border); font-weight: 600; display: flex; justify-content: space-between; align-items: center;">
                            <span>الإشعارات</span>
                            <button id="clearNotifications" style="font-size: 0.8rem; color: var(--color-accent); background: none; border: none; cursor: pointer;">مسح الكل</button>
                        </div>
                        <div id="notificationsList" style="padding: 0.5rem;">
                            <p style="text-align: center; padding: 1rem; color: var(--color-text-secondary);">لا توجد إشعارات جديدة</p>
                        </div>
                    </div>
                </div>

                <div class="profile-nav-item" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;" id="profileNavBtn">
                    <div style="width: 32px; height: 32px; background: var(--color-accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;" id="userInitial">U</div>
                </div>
                
                <button id="signOutBtn" class="btn btn-secondary btn-sm">خروج</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-container" style="margin-top: 2rem;">
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="tickets">تذاكري</div>
            <div class="nav-tab" data-tab="profile">الملف الشخصي</div>
        </div>

        <!-- قسم التذاكر -->
        <div id="ticketsTab" class="tab-content active">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>تذاكري</h1>
                <button class="btn btn-primary" id="openCreateTicket">إنشاء تذكرة جديدة</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-content">
                        <p class="stat-label">إجمالي التذاكر</p>
                        <p class="stat-value" id="userTotalTickets">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-content">
                        <p class="stat-label">قيد المعالجة</p>
                        <p class="stat-value" id="userInProgressTickets" style="color: var(--color-accent);">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-content">
                        <p class="stat-label">المحلولة</p>
                        <p class="stat-value" id="userResolvedTickets" style="color: var(--color-success);">0</p>
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <input type="text" id="ticketSearch" placeholder="بحث في تذاكري...">
                <select id="statusFilter">
                    <option value="all">كل الحالات</option>
                    <option value="open">مفتوحة</option>
                    <option value="in-progress">قيد المعالجة</option>
                    <option value="resolved">محلولة</option>
                </select>
            </div>

            <div id="userTicketsList" class="tickets-grid">
                <!-- التذاكر ستظهر هنا كبطاقات -->
            </div>
        </div>

        <!-- قسم الملف الشخصي -->
        <div id="profileTab" class="tab-content">
            <div class="page-header">
                <h1>الملف الشخصي</h1>
            </div>
            <div class="profile-section">
                <div id="profileMessage" class="message-box" style="display: none; margin-bottom: 1rem; padding: 1rem; border-radius: 0.5rem;"></div>
                <form id="profileForm" class="profile-form">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="profileFullName" class="form-control" placeholder="أدخل اسمك الكامل">
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="profileEmail" class="form-control" disabled>
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="profilePhone" class="form-control" placeholder="أدخل رقم هاتفك">
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور الجديدة</label>
                        <input type="password" id="profilePassword" class="form-control" placeholder="اتركها فارغة إذا لا تريد التغيير">
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveProfileBtn">حفظ التغييرات</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Modal إنشاء تذكرة -->
    <div id="createTicketModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>إنشاء تذكرة جديدة</h2>
            <form id="userCreateTicketForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label>عنوان المشكلة</label>
                    <input type="text" id="userTicketTitle" class="form-control" required placeholder="مثال: مشكلة في تسجيل الدخول">
                </div>
                <div class="form-group">
                    <label>وصف المشكلة</label>
                    <textarea id="userTicketDescription" class="form-control" style="min-height: 120px;" required placeholder="اشرح المشكلة بالتفصيل..."></textarea>
                </div>
                <div class="form-group">
                    <label>الأولوية</label>
                    <select id="userTicketPriority" class="form-control">
                        <option value="low">منخفضة</option>
                        <option value="medium" selected>متوسطة</option>
                        <option value="high">عالية</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">إرسال التذكرة</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { requireAuth, logout, updateProfile } from './auth-client.js';
        import { 
            fetchUserTickets, 
            createTicket, 
            fetchTicketStats,
            subscribeToTickets
        } from './tickets-service.js';
        import { supabase } from './api-config.js';

        // 1. حماية الصفحة
        let user;
        try {
            user = await requireAuth('customer');
            if (!user) window.location.replace('sign-in.html');
            if (user.isImpersonated) {
                document.getElementById('impersonationBanner').style.display = 'block';
                document.getElementById('signOutBtn').style.display = 'none';
            }
        } catch (err) {
            window.location.replace('sign-in.html');
        }

        // 2. عرض البيانات الأولية
        if (user) {
            const name = user.profile?.full_name || user.email;
            document.getElementById('userInitial').textContent = name.charAt(0).toUpperCase();
            document.getElementById('profileEmail').value = user.profile?.email || user.email;
            document.getElementById('profileFullName').value = user.profile?.full_name || '';
            document.getElementById('profilePhone').value = user.profile?.phone || '';
            document.getElementById('pointsCount').textContent = user.profile?.points || 0;
            document.getElementById('pointsTooltip').textContent = user.profile?.points || 0;
        }

        // 3. التنقل بين التبويبات
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `${tabName}Tab`));
            if (tabName === 'tickets') renderTickets();
        }

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        document.getElementById('profileNavBtn').onclick = () => switchTab('profile');

        // 4. تسجيل الخروج
        document.getElementById('signOutBtn').onclick = async () => {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                await logout();
                window.location.href = 'sign-in.html';
            }
        };

        // 5. إدارة التذاكر
        async function renderStats() {
            const stats = await fetchTicketStats();
            document.getElementById('userTotalTickets').textContent = stats.total;
            document.getElementById('userInProgressTickets').textContent = stats.inProgress;
            document.getElementById('userResolvedTickets').textContent = stats.resolved;
        }

        async function renderTickets(filters = {}) {
            const list = document.getElementById('userTicketsList');
            list.innerHTML = '<p style="text-align:center; padding: 2rem;">جاري التحميل...</p>';
            
            const tickets = await fetchUserTickets(filters);
            list.innerHTML = '';

            if (!tickets.length) {
                list.innerHTML = '<p style="text-align:center; padding: 2rem; color: var(--color-text-secondary);">لا توجد تذاكر</p>';
                return;
            }

            tickets.forEach(t => {
                const el = document.createElement('div');
                el.className = 'ticket-card';
                const statusLabels = { 'open': 'مفتوحة', 'in-progress': 'قيد المعالجة', 'resolved': 'تم الحل', 'closed': 'مغلقة' };
                const priorityLabels = { 'low': 'منخفضة', 'medium': 'متوسطة', 'high': 'عالية' };
                const userName = t.profiles?.full_name || t.profiles?.email?.split('@')[0] || 'مستخدم';

                el.innerHTML = `
                    <div class="ticket-card-header">
                        <span class="ticket-number">#${t.ticket_number || '---'}</span>
                        <span class="ticket-status status-${t.status}">${statusLabels[t.status] || t.status}</span>
                    </div>
                    <div class="ticket-card-body">
                        <h3 class="ticket-title">${t.title}</h3>
                        <p class="ticket-user">بواسطة: <strong>${userName}</strong></p>
                        <p class="ticket-description">${t.description.substring(0, 100)}${t.description.length > 100 ? '...' : ''}</p>
                    </div>
                    <div class="ticket-card-footer">
                        <span class="ticket-priority priority-${t.priority}">${priorityLabels[t.priority] || t.priority}</span>
                        <span class="ticket-date">${new Date(t.created_at).toLocaleDateString('ar-EG')}</span>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        // 6. إنشاء تذكرة
        const modal = document.getElementById('createTicketModal');
        document.getElementById('openCreateTicket').onclick = () => modal.classList.add('active');
        document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
        
        document.getElementById('userCreateTicketForm').onsubmit = async (e) => {
            e.preventDefault();
            await createTicket({
                title: document.getElementById('userTicketTitle').value,
                description: document.getElementById('userTicketDescription').value,
                priority: document.getElementById('userTicketPriority').value
            });
            modal.classList.remove('active');
            e.target.reset();
            renderStats();
            renderTickets();
        };

        // 7. الإشعارات
        let notifications = [];
        const notificationBtn = document.getElementById('notificationBtn');
        const notificationDropdown = document.getElementById('notificationDropdown');
        const notificationBadge = document.getElementById('notificationBadge');
        const notificationsList = document.getElementById('notificationsList');

        function updateNotificationUI() {
            notificationBadge.style.display = notifications.length ? 'flex' : 'none';
            notificationBadge.textContent = notifications.length;
            if (notifications.length) {
                notificationsList.innerHTML = '';
                notifications.forEach((n, i) => {
                    const div = document.createElement('div');
                    div.style.padding = '0.75rem';
                    div.style.borderBottom = '1px solid var(--color-border)';
                    div.style.cursor = 'pointer';
                    div.innerHTML = `
                        <div style="font-size:0.9rem;">${n.message}</div>
                        <div style="font-size:0.7rem; color:var(--color-text-secondary);">${new Date(n.time).toLocaleTimeString('ar-EG')}</div>
                    `;
                    div.onclick = () => {
                        switchTab('tickets');
                        notifications.splice(i, 1);
                        updateNotificationUI();
                    };
                    notificationsList.appendChild(div);
                });
            } else {
                notificationsList.innerHTML = '<p style="text-align:center; padding:1rem;">لا توجد إشعارات</p>';
            }
        }

        notificationBtn.onclick = (e) => {
            e.stopPropagation();
            notificationDropdown.style.display = notificationDropdown.style.display === 'none' ? 'block' : 'none';
        };
        document.onclick = () => notificationDropdown.style.display = 'none';
        document.getElementById('clearNotifications').onclick = () => {
            notifications = [];
            updateNotificationUI();
        };

        subscribeToTickets((payload) => {
            renderTickets();
            renderStats();
            if (payload.eventType === 'UPDATE' && payload.new.user_id === user.id) {
                notifications.unshift({
                    ticketId: payload.new.id,
                    message: `تم تحديث حالة تذكرتك #${payload.new.ticket_number} إلى ${payload.new.status}`,
                    time: new Date()
                });
                updateNotificationUI();
            }
        });

        // الفلاتر والبحث
        document.getElementById('statusFilter').onchange = (e) => renderTickets({ status: e.target.value });
        let searchTimeout;
        document.getElementById('ticketSearch').oninput = (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => renderTickets({ search: e.target.value }), 500);
        };

        renderStats();
        renderTickets();
    </script>
</body>
</html>
