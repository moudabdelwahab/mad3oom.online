<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة العميل - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
    <style>
        .profile-section { background: var(--color-surface); padding: 2rem; border-radius: 1rem; box-shadow: var(--shadow-sm); margin-top: 2rem; }
        .nav-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.5rem; overflow-x: auto; }
        .nav-tab { padding: 0.5rem 1rem; cursor: pointer; border-radius: 0.5rem; transition: all 0.3s; font-weight: 600; color: var(--color-text-secondary); white-space: nowrap; }
        .nav-tab:hover { background: var(--hover-bg); color: var(--color-accent); }
        .nav-tab.active { background: var(--color-accent); color: white; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); z-index: 9999; align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--color-surface); padding: 2.5rem; border-radius: 1.25rem; width: 100%; max-width: 650px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: var(--shadow); border: 1px solid var(--color-border); }
        .wallet-info { position: relative; display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--color-muted); border-radius: 2rem; cursor: pointer; }
        .wallet-tooltip { display: none; position: absolute; top: 100%; right: 0; background: var(--color-surface); color: var(--color-text); padding: 0.75rem 1rem; border-radius: 0.5rem; box-shadow: var(--shadow); border: 1px solid var(--color-border); margin-top: 0.5rem; white-space: nowrap; z-index: 100; }
        .wallet-info:hover .wallet-tooltip { display: block; }
        .impersonation-banner { background: #fee2e2; color: #991b1b; padding: 0.75rem; text-align: center; font-weight: bold; border-bottom: 1px solid #f87171; }
        .reply-item { padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; background: var(--color-muted); }
        .reply-admin { border-right: 4px solid var(--color-accent); }
        .reply-user { border-right: 4px solid var(--color-success); }
        .avatar-upload { position: relative; width: 100px; height: 100px; margin: 0 auto 2rem; }
        .avatar-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--color-accent); }
        .avatar-edit-btn { position: absolute; bottom: 0; right: 0; background: var(--color-accent); color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--color-surface); }
        .ticket-card { cursor: pointer; transition: transform 0.2s; }
        .ticket-card:hover { transform: translateY(-5px); }
        .view-ticket-btn { margin-top: 1rem; width: 100%; }
    </style>
</head>
<body>
    <div id="impersonationBanner" class="impersonation-banner" style="display: none;">أنت تتصفح الآن كعميل (وضع التمثيل للمسؤولين)</div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><img src="/assets/images/logo.png" alt="Logo" class="logo-image"><span>لوحة العميل</span></div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <div class="wallet-info" id="walletBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg>
                    <span id="pointsCount">0</span>
                    <div class="wallet-tooltip">رصيدك الحالي: <strong id="pointsTooltip">0</strong> نقطة</div>
                </div>
                <div class="notification-wrapper" style="position: relative; display: flex; align-items: center;">
                    <button id="notificationBtn" class="notification-btn" style="background: none; border: 1px solid var(--color-border); border-radius: 0.5rem; padding: 0.5rem; cursor: pointer; color: var(--color-text); display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="notificationBadge" style="display: none; position: absolute; top: -5px; right: -5px; background: var(--color-danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--color-surface);">0</span>
                    </button>
                    <div id="notificationDropdown" style="display: none; position: absolute; top: 100%; left: 0; width: 300px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 0.5rem; box-shadow: var(--shadow); z-index: 1001; margin-top: 0.5rem; max-height: 400px; overflow-y: auto;">
                        <div style="padding: 1rem; border-bottom: 1px solid var(--color-border); font-weight: 600; display: flex; justify-content: space-between; align-items: center;"><span>الإشعارات</span><button id="clearNotifications" style="font-size: 0.8rem; color: var(--color-accent); background: none; border: none; cursor: pointer;">مسح الكل</button></div>
                        <div id="notificationsList" style="padding: 0.5rem;"></div>
                    </div>
                </div>
                <div class="profile-nav-item" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;" id="profileNavBtn">
                    <img id="navAvatar" src="" style="width: 32px; height: 32px; border-radius: 50%; display: none; object-fit: cover;">
                    <div style="width: 32px; height: 32px; background: var(--color-accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;" id="userInitial">U</div>
                </div>
                <button id="signOutBtn" class="btn btn-secondary btn-sm">خروج</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-container" style="margin-top: 2rem;">
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="tickets">تذاكري</div>
            <div class="nav-tab" data-tab="profile">الملف الشخصي</div>
        </div>
        
        <div id="ticketsTab" class="tab-content active">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>تذاكري</h1>
                <button class="btn btn-primary" id="openCreateTicket">إنشاء تذكرة جديدة</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-content"><p class="stat-label">إجمالي التذاكر</p><p class="stat-value" id="userTotalTickets">0</p></div></div>
                <div class="stat-card"><div class="stat-content"><p class="stat-label">قيد المعالجة</p><p class="stat-value" id="userInProgressTickets" style="color: var(--color-accent);">0</p></div></div>
                <div class="stat-card"><div class="stat-content"><p class="stat-label">المحلولة</p><p class="stat-value" id="userResolvedTickets" style="color: var(--color-success);">0</p></div></div>
            </div>
            <div id="userTicketsList" class="tickets-grid"></div>
        </div>

        <div id="profileTab" class="tab-content">
            <div class="page-header"><h1>الملف الشخصي</h1></div>
            <div class="profile-section">
                <div class="avatar-upload">
                    <img id="profileAvatarPreview" src="https://via.placeholder.com/100" class="avatar-preview">
                    <label for="avatarInput" class="avatar-edit-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </label>
                    <input type="file" id="avatarInput" style="display: none;" accept="image/*">
                </div>
                <form id="profileForm" class="profile-form">
                    <div class="form-group"><label>الاسم الكامل</label><input type="text" id="profileFullName" class="form-control" required></div>
                    <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="profileEmail" class="form-control" disabled></div>
                    <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="profilePhone" class="form-control" placeholder="أدخل رقم هاتفك"></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">حفظ التغييرات</button>
                </form>
                <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--color-border);">
                <h3>تغيير كلمة المرور</h3>
                <form id="changePasswordForm" style="margin-top: 1rem;">
                    <div class="form-group"><label>كلمة المرور الجديدة</label><input type="password" id="newPassword" class="form-control" required minlength="6"></div>
                    <div class="form-group"><label>تأكيد كلمة المرور</label><input type="password" id="confirmPassword" class="form-control" required minlength="6"></div>
                    <button type="submit" class="btn btn-secondary" style="width: 100%;">تحديث كلمة المرور</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Modal إنشاء تذكرة -->
    <div id="createTicketModal" class="modal">
        <div class="modal-content">
            <h2>إنشاء تذكرة جديدة</h2>
            <form id="createTicketForm" style="margin-top: 1.5rem;">
                <div class="form-group"><label>العنوان</label><input type="text" id="ticketTitle" class="form-control" required></div>
                <div class="form-group"><label>الوصف</label><textarea id="ticketDescription" class="form-control" style="min-height: 120px;" required></textarea></div>
                <div class="form-group">
                    <label>الأولوية</label>
                    <select id="ticketPriority" class="form-control">
                        <option value="low">منخفضة</option>
                        <option value="medium" selected>متوسطة</option>
                        <option value="high">عالية</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" style="flex: 1;" id="closeCreateTicket">إلغاء</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">إنشاء التذكرة</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal تفاصيل التذكرة -->
    <div id="ticketDetailModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 id="detailTicketTitle">تفاصيل التذكرة</h2>
                    <p id="detailTicketMeta" style="font-size: 0.9rem; color: var(--color-text-secondary); margin-top: 0.5rem;"></p>
                </div>
                <span id="detailTicketStatus" class="status-badge"></span>
            </div>
            <div id="detailTicketDescription" style="margin: 1.5rem 0; padding: 1rem; background: var(--color-muted); border-radius: 0.5rem; white-space: pre-wrap;"></div>
            <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 1.5rem 0;">
            <h3>الردود</h3>
            <div id="detailRepliesList" style="margin: 1rem 0; max-height: 300px; overflow-y: auto; padding: 0.5rem;"></div>
            <form id="detailReplyForm">
                <textarea id="detailReplyMessage" style="width: 100%; min-height: 100px; margin-bottom: 1rem; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: 0.5rem;" placeholder="اكتب ردك هنا..." required></textarea>
                <button type="submit" class="btn btn-primary" style="width: 100%;">إرسال الرد</button>
            </form>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem;" id="closeDetailModal">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { requireAuth, logout, updateProfile, uploadAvatar, updatePassword } from './auth-client.js';
        import { fetchUserTickets, createTicket, fetchTicketStats, subscribeToTickets, fetchTicketReplies, addTicketReply } from './tickets-service.js';
        import { fetchNotifications, markAllAsRead, subscribeToNotifications } from './notifications-service.js';

        let user;
        try {
            user = await requireAuth('customer');
            if (!user) window.location.replace('sign-in.html');
            if (user.isImpersonated) { 
                document.getElementById('impersonationBanner').style.display = 'block'; 
                document.getElementById('signOutBtn').style.display = 'none'; 
            }
        } catch (err) { window.location.replace('sign-in.html'); }

        function updateUIWithUserData() {
            if (user) {
                const profile = user.profile || {};
                const name = profile.full_name || user.email;
                document.getElementById('userInitial').textContent = name.charAt(0).toUpperCase();
                document.getElementById('profileEmail').value = profile.email || user.email;
                document.getElementById('profileFullName').value = profile.full_name || '';
                document.getElementById('profilePhone').value = profile.phone || '';
                document.getElementById('pointsCount').textContent = profile.points || 0;
                document.getElementById('pointsTooltip').textContent = profile.points || 0;
                
                if (profile.avatar_url) {
                    document.getElementById('navAvatar').src = profile.avatar_url;
                    document.getElementById('navAvatar').style.display = 'block';
                    document.getElementById('userInitial').style.display = 'none';
                    document.getElementById('profileAvatarPreview').src = profile.avatar_url;
                }
            }
        }
        updateUIWithUserData();

        // تبديل التبويبات
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.nav-tab, .tab-content').forEach(el => el.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
            };
        });

        // إدارة المودال (إنشاء تذكرة)
        const createModal = document.getElementById('createTicketModal');
        document.getElementById('openCreateTicket').onclick = () => createModal.classList.add('active');
        document.getElementById('closeCreateTicket').onclick = () => createModal.classList.remove('active');

        document.getElementById('createTicketForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                await createTicket({
                    title: document.getElementById('ticketTitle').value,
                    description: document.getElementById('ticketDescription').value,
                    priority: document.getElementById('ticketPriority').value
                });
                createModal.classList.remove('active');
                e.target.reset();
                renderTickets();
            } catch (err) { alert('خطأ في إنشاء التذكرة: ' + err.message); }
            finally { btn.disabled = false; }
        };

        async function renderTickets() {
            const list = document.getElementById('userTicketsList');
            const tickets = await fetchUserTickets();
            list.innerHTML = tickets.length ? '' : '<p style="text-align:center; padding: 2rem;">لا توجد تذاكر</p>';
            tickets.forEach(t => {
                const el = document.createElement('div');
                el.className = 'ticket-card';
                el.innerHTML = `
                    <div class="ticket-card-header">
                        <span class="ticket-number">#${t.ticket_number}</span>
                        <span class="ticket-status status-${t.status}">${t.status === 'open' ? 'مفتوحة' : t.status === 'in-progress' ? 'قيد المعالجة' : 'محلولة'}</span>
                    </div>
                    <div class="ticket-card-body">
                        <h3 class="ticket-title">${t.title}</h3>
                        <p style="font-size:0.85rem; color:var(--color-text-secondary); margin-top:0.5rem;">${t.description.substring(0, 60)}...</p>
                        <button class="btn btn-secondary btn-sm view-ticket-btn">عرض التذكرة</button>
                    </div>
                `;
                el.onclick = () => openTicketDetail(t);
                list.appendChild(el);
            });
            const stats = await fetchTicketStats();
            document.getElementById('userTotalTickets').textContent = stats.total;
            document.getElementById('userInProgressTickets').textContent = stats.inProgress;
            document.getElementById('userResolvedTickets').textContent = stats.resolved;
        }

        let currentTicket = null;
        async function openTicketDetail(ticket) {
            currentTicket = ticket;
            document.getElementById('detailTicketTitle').textContent = ticket.title;
            document.getElementById('detailTicketDescription').textContent = ticket.description;
            document.getElementById('detailTicketMeta').textContent = `تاريخ الإنشاء: ${new Date(ticket.created_at).toLocaleDateString('ar-EG')} | رقم التذكرة: #${ticket.ticket_number}`;
            
            const statusEl = document.getElementById('detailTicketStatus');
            statusEl.className = `status-badge status-${ticket.status}`;
            statusEl.textContent = ticket.status === 'open' ? 'مفتوحة' : ticket.status === 'in-progress' ? 'قيد المعالجة' : 'محلولة';
            
            document.getElementById('ticketDetailModal').classList.add('active');
            loadReplies(ticket.id);
        }

        async function loadReplies(ticketId) {
            const list = document.getElementById('detailRepliesList');
            list.innerHTML = '<p style="text-align:center;">جاري تحميل الردود...</p>';
            const replies = await fetchTicketReplies(ticketId);
            list.innerHTML = replies.length ? '' : '<p style="text-align:center; color:var(--color-text-secondary);">لا توجد ردود بعد</p>';
            replies.filter(r => !r.is_internal).forEach(r => {
                const div = document.createElement('div');
                div.className = `reply-item ${r.profiles?.role === 'admin' ? 'reply-admin' : 'reply-user'}`;
                div.innerHTML = `<div style="font-size:0.8rem;margin-bottom:0.5rem;"><strong>${r.profiles?.full_name || 'مستخدم'}</strong> <span style="font-size:0.7rem; color:var(--color-text-secondary); float:left;">${new Date(r.created_at).toLocaleString('ar-EG')}</span></div><div>${r.message}</div>`;
                list.appendChild(div);
            });
            list.scrollTop = list.scrollHeight;
        }

        document.getElementById('closeDetailModal').onclick = () => document.getElementById('ticketDetailModal').classList.remove('active');

        document.getElementById('detailReplyForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('detailReplyMessage').value;
            if (!msg || !currentTicket) return;
            try {
                await addTicketReply(currentTicket.id, msg);
                document.getElementById('detailReplyMessage').value = '';
                loadReplies(currentTicket.id);
            } catch (err) { alert('خطأ في إرسال الرد'); }
        };

        // تحديث البروفايل
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await updateProfile({
                    full_name: document.getElementById('profileFullName').value,
                    phone: document.getElementById('profilePhone').value
                });
                alert('تم تحديث البيانات بنجاح');
                // تحديث بيانات المستخدم محلياً
                user.profile.full_name = document.getElementById('profileFullName').value;
                user.profile.phone = document.getElementById('profilePhone').value;
                updateUIWithUserData();
            } catch (err) { alert('خطأ في التحديث'); }
        };

        // تغيير كلمة المرور
        document.getElementById('changePasswordForm').onsubmit = async (e) => {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (pass !== confirm) return alert('كلمات المرور غير متطابقة');
            try {
                await updatePassword(pass);
                alert('تم تغيير كلمة المرور بنجاح');
                e.target.reset();
            } catch (err) { alert('خطأ في تغيير كلمة المرور'); }
        };

        // رفع الصورة
        document.getElementById('avatarInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const url = await uploadAvatar(file);
                await updateProfile({ avatar_url: url });
                user.profile.avatar_url = url;
                updateUIWithUserData();
                alert('تم تحديث صورة الملف الشخصي');
            } catch (err) { alert('خطأ في رفع الصورة'); }
        };

        async function loadNotifications() {
            const list = document.getElementById('notificationsList');
            const badge = document.getElementById('notificationBadge');
            const notes = await fetchNotifications();
            const unread = notes.filter(n => !n.is_read).length;
            badge.style.display = unread ? 'flex' : 'none';
            badge.textContent = unread;
            list.innerHTML = notes.length ? '' : '<p style="text-align:center;padding:1rem;">لا توجد إشعارات</p>';
            notes.forEach(n => {
                const div = document.createElement('div');
                div.style.padding = '0.75rem'; div.style.borderBottom = '1px solid var(--color-border)';
                div.innerHTML = `<div style="font-size:0.9rem; font-weight:${n.is_read ? 'normal' : 'bold'}">${n.message}</div>`;
                list.appendChild(div);
            });
        }

        document.getElementById('notificationBtn').onclick = (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('notificationDropdown');
            dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
            if (dropdown.style.display === 'block') markAllAsRead().then(loadNotifications);
        };

        document.getElementById('signOutBtn').onclick = async () => { await logout(); window.location.href = 'sign-in.html'; };
        
        if (user && user.id) {
            subscribeToNotifications(user.id, loadNotifications);
        }
        subscribeToTickets(renderTickets);
        renderTickets();
        loadNotifications();
    </script>
</body>
</html>
