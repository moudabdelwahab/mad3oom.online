<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">

    <style>
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle {
            position: absolute;
            left: 10px;
            cursor: pointer;
            background: none;
            border: none;
        }
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding-left: 40px;
        }
    </style>

    <script>
        (function () {
            try {
                const theme =
                    localStorage.getItem('theme-preference') ||
                    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <script src="theme-manager.js" defer></script>
</head>

<body class="auth-wrapper">

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="logo.svg" alt="Logo" class="logo-image">
            <span>منصة مدعوم</span>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="sign-in.html">تسجيل الدخول</a></li>
            <li><a href="sign-up.html">حساب جديد</a></li>
        </ul>
    </div>
</nav>

<main class="auth-container">
    <section class="auth-card">
        <h1>تسجيل الدخول</h1>
        <p class="auth-subtitle">سجل دخولك للوصول إلى لوحة التحكم الخاصة بك</p>

        <div id="successMessage" class="message-box message-success" style="display:none;">
            تم تسجيل الدخول بنجاح! جاري التحويل...
        </div>

        <div id="errorMessage" class="message-box message-error" style="display:none;">
            <span id="errorText"></span>
        </div>

        <button id="resendEmailBtn"
                class="btn btn-secondary"
                style="display:none;margin-top:10px;">
            إعادة إرسال رسالة تأكيد البريد الإلكتروني
        </button>

        <form id="signInForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required minlength="8">
                    <button type="button" id="togglePassword">👁️</button>
                </div>
            </div>

            <button class="btn btn-primary" id="loginBtn" type="submit">
                <span id="loginBtnText">تسجيل الدخول</span>
                <span id="loginBtnLoader" style="display:none;">جاري التحقق...</span>
            </button>
        </form>
    </section>
</main>

<script type="module">
import { signIn, getCurrentUser } from './auth-client.js';
import { supabase } from './api-config.js';

const form = document.getElementById('signInForm');
const submitBtn = document.getElementById('loginBtn');
const btnText = document.getElementById('loginBtnText');
const btnLoader = document.getElementById('loginBtnLoader');
const errorMessage = document.getElementById('errorMessage');
const errorText = document.getElementById('errorText');
const successMessage = document.getElementById('successMessage');
const resendBtn = document.getElementById('resendEmailBtn');
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

let isLoggingIn = false;

togglePassword.onclick = () => {
    passwordInput.type =
        passwordInput.type === 'password' ? 'text' : 'password';
};

function setLoading(state) {
    submitBtn.disabled = state;
    btnText.style.display = state ? 'none' : 'inline';
    btnLoader.style.display = state ? 'inline' : 'none';
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    isLoggingIn = true;

    setLoading(true);
    errorMessage.style.display = 'none';
    resendBtn.style.display = 'none';

    const email = document.getElementById('email').value;
    const password = passwordInput.value;

    try {
        const { error } = await signIn(email, password);
        if (error) throw error;

        successMessage.style.display = 'block';

        let user = await getCurrentUser();
        if (!user?.profile) {
            await new Promise(r => setTimeout(r, 1200));
            user = await getCurrentUser();
        }

        window.location.replace(
            user?.profile?.role === 'admin'
                ? 'admin-dashboard.html'
                : 'customer-dashboard.html'
        );

    } catch (err) {
        isLoggingIn = false;
        setLoading(false);
        errorMessage.style.display = 'block';

        if (err.message?.toLowerCase().includes('confirm')) {
            errorText.textContent = 'بريدك الإلكتروني غير مفعل.';
            resendBtn.style.display = 'block';

            resendBtn.onclick = async () => {
                resendBtn.disabled = true;
                resendBtn.textContent = 'جاري الإرسال...';
                await supabase.auth.resend({ type: 'signup', email });
                resendBtn.textContent = 'تم الإرسال 📩';
            };

        } else if (err.message === 'Invalid login credentials') {
            errorText.textContent = 'بيانات الدخول غير صحيحة.';
        } else {
            errorText.textContent = 'حدث خطأ، حاول مرة أخرى.';
        }
    }
});

// Redirect لو مسجل دخول مسبقًا
(async () => {
    if (isLoggingIn) return;
    const user = await getCurrentUser();
    if (user?.profile) {
        window.location.replace(
            user.profile.role === 'admin'
                ? 'admin-dashboard.html'
                : 'customer-dashboard.html'
        );
    }
})();
</script>

</body>
</html>
