<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
    <style>
        .profile-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-sm);
            margin-top: 2rem;
        }
        .profile-form {
            display: grid;
            gap: 1.5rem;
            max-width: 600px;
        }
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .nav-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
        .nav-tab.active {
            background: var(--primary-color);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: var(--card-bg);
            border-radius: 0.5rem;
            overflow: hidden;
        }
        th, td {
            padding: 1rem;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="logo.svg" alt="Logo" class="logo-image">
                <span>لوحة الإدارة</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
            </div>
            <ul class="nav-menu">
                <li id="welcomeAdmin"></li>
                <li><a href="#" id="profileLink" class="nav-tab-trigger" data-tab="profile">الملف الشخصي</a></li>
                <li><a href="#" id="signOutLink">تسجيل الخروج</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="margin-top: 2rem;">
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="overview">إدارة التذاكر</div>
            <div class="nav-tab" data-tab="profile">الملف الشخصي</div>
        </div>

        <!-- قسم الإدارة -->
        <div id="overviewTab" class="tab-content active">
            <div class="page-header">
                <h1>إدارة التذاكر</h1>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">إجمالي التذاكر</p>
                    <p class="stat-value" id="admTotal">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">المفتوحة</p>
                    <p class="stat-value" id="admOpen" style="color: var(--warning-color);">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">المحلولة</p>
                    <p class="stat-value" id="admResolved" style="color: var(--success-color);">0</p>
                </div>
            </div>

            <div style="overflow-x: auto; margin-top: 2rem;">
                <table>
                    <thead>
                        <tr>
                            <th>المستخدم</th>
                            <th>العنوان</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="admTicketsBody">
                        <tr><td colspan="5" style="text-align:center;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- قسم البروفايل -->
        <div id="profileTab" class="tab-content">
            <div class="profile-section">
                <h2>إعدادات المسؤول</h2>
                <p>تعديل بيانات الحساب الإداري</p>
                
                <div id="profileMessage" class="message-box" style="display: none; margin-bottom: 1rem;"></div>

                <form id="profileForm" class="profile-form">
                    <div class="form-group">
                        <label for="profileFullName">الاسم الكامل</label>
                        <input type="text" id="profileFullName" placeholder="أدخل اسمك الكامل">
                    </div>
                    <div class="form-group">
                        <label for="profileEmail">البريد الإلكتروني</label>
                        <input type="email" id="profileEmail" placeholder="أدخل بريدك الإلكتروني">
                    </div>
                    <div class="form-group">
                        <label for="profilePhone">رقم الهاتف</label>
                        <input type="tel" id="profilePhone" placeholder="أدخل رقم هاتفك">
                    </div>
                    <div class="form-group">
                        <label for="profilePassword">كلمة المرور الجديدة</label>
                        <input type="password" id="profilePassword" placeholder="اتركها فارغة إذا لا تريد التغيير">
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveProfileBtn">حفظ التغييرات</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { requireAuth, logout, updateProfile } from './auth-client.js';
        import { fetchUserTickets, fetchTicketStats, updateTicketStatus, deleteTicket } from './tickets-service.js';

        // 1. حماية الصفحة (Admin Only)
        const user = await requireAuth('admin');
        if (!user) {
            window.location.replace('sign-in.html');
            return;
        }

        // 2. عرض البيانات
        document.getElementById('welcomeAdmin').textContent = `مرحباً أدمن، ${user.profile?.full_name || user.email}`;
        document.getElementById('profileEmail').value = user.email;
        document.getElementById('profileFullName').value = user.profile?.full_name || '';
        document.getElementById('profilePhone').value = user.profile?.phone || '';

        // 3. التبديل بين التبويبات
        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.nav-tab');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tabName);
            });
            
            contents.forEach(c => {
                c.classList.toggle('active', c.id === `${tabName}Tab`);
            });
        }

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        // ربط زر الملف الشخصي في النافبار
        document.getElementById('profileLink').addEventListener('click', (e) => {
            e.preventDefault();
            switchTab('profile');
        });

        // 4. تحديث البروفايل
        const profileForm = document.getElementById('profileForm');
        const profileMessage = document.getElementById('profileMessage');

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('saveProfileBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'جاري الحفظ...';

            try {
                const fullName = document.getElementById('profileFullName').value;
                const phone = document.getElementById('profilePhone').value;
                const email = document.getElementById('profileEmail').value;
                const password = document.getElementById('profilePassword').value;

                // 1. تحديث البروفايل
                const { error: profileError } = await updateProfile({
                    full_name: fullName,
                    phone: phone,
                    updated_at: new Date()
                });
                if (profileError) throw profileError;

                // 2. تحديث الإيميل
                if (email !== user.email) {
                    const { error: emailError } = await import('./auth-client.js').then(m => m.updateEmail(email));
                    if (emailError) throw emailError;
                }

                // 3. تحديث كلمة المرور
                if (password) {
                    const { error: pwdError } = await import('./auth-client.js').then(m => m.updatePassword(password));
                    if (pwdError) throw pwdError;
                }

                profileMessage.style.display = 'block';
                profileMessage.className = 'message-box message-success';
                profileMessage.textContent = 'تم تحديث بيانات المسؤول بنجاح. إذا قمت بتغيير الإيميل، يرجى تأكيده.';
                
                document.getElementById('welcomeAdmin').textContent = `مرحباً أدمن، ${fullName}`;
                document.getElementById('profilePassword').value = '';

            } catch (err) {
                profileMessage.style.display = 'block';
                profileMessage.className = 'message-box message-error';
                profileMessage.textContent = err.message || 'فشل التحديث';
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'حفظ التغييرات';
            }
        });

        // 5. تسجيل الخروج
        const signOutBtn = document.getElementById('signOutLink');
        if (signOutBtn) {
            signOutBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                try {
                    await logout();
                    window.location.href = 'sign-in.html';
                } catch (err) {
                    console.error('Logout error:', err);
                    window.location.href = 'sign-in.html';
                }
            });
        }

        // 6. تحميل وإدارة التذاكر
        async function loadAdminTickets() {
            try {
                const stats = await fetchTicketStats();
                document.getElementById('admTotal').textContent = stats.total;
                document.getElementById('admOpen').textContent = stats.open;
                document.getElementById('admResolved').textContent = stats.resolved;

                const tickets = await fetchUserTickets();
                const tbody = document.getElementById('admTicketsBody');
                tbody.innerHTML = '';

                if (tickets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد تذاكر حالياً</td></tr>';
                    return;
                }

                tickets.forEach(t => {
                    const tr = document.createElement('tr');
                    const userIdentifier = t.profiles?.full_name || t.profiles?.email || 'مستخدم مجهول';
                    tr.innerHTML = `
                        <td>${userIdentifier}</td>
                        <td>${t.title}</td>
                        <td><span class="status-badge status-${t.status}">${t.status}</span></td>
                        <td>${new Date(t.created_at).toLocaleDateString('ar-EG')}</td>
                        <td>
                            <button class="btn btn-secondary btn-sm" data-id="${t.id}" data-action="resolve">حل</button>
                            <button class="btn btn-danger btn-sm" data-id="${t.id}" data-action="delete">حذف</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // ربط الأحداث بالأزرار
                tbody.querySelectorAll('button').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.dataset.id;
                        const action = btn.dataset.action;
                        if (action === 'resolve') {
                            await updateTicketStatus(id, 'resolved');
                        } else if (action === 'delete') {
                            if (confirm('هل أنت متأكد من حذف هذه التذكرة؟')) {
                                await deleteTicket(id);
                            } else {
                                return;
                            }
                        }
                        loadAdminTickets();
                    };
                });
            } catch (err) {
                console.error('Admin tickets error:', err);
            }
        }

        loadAdminTickets();
    </script>
</body>
</html>
