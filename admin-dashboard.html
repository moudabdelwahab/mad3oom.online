<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0f172a;
            --color-secondary: #1e293b;
            --color-accent: #3b82f6;
            --color-accent-hover: #2563eb;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-text: #f8fafc;
            --color-text-muted: #94a3b8;
            --color-border: #334155;
            --color-surface: #1e293b;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--color-primary);
            color: var(--color-text);
        }

        /* إصلاح شريط التنقل */
        .admin-nav {
            background: var(--color-secondary);
            border-bottom: 1px solid var(--color-border);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-right, .nav-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-logo {
            height: 40px !important;
            width: auto !important;
            object-fit: contain;
        }

        .admin-title {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--color-text);
        }

        /* شارة Admin */
        .admin-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 0.35rem 0.85rem;
            border-radius: 2rem;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
            animation: adminPulse 2s infinite;
        }

        @keyframes adminPulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--color-accent);
        }

        /* تحسين تصميم التبويبات */
        .admin-tabs {
            display: flex;
            gap: 0.75rem;
            margin: 2rem 0;
            background: var(--color-secondary);
            padding: 0.5rem;
            border-radius: 1rem;
            border: 1px solid var(--color-border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: var(--color-text-muted);
            cursor: pointer;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            border-radius: 0.75rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #fff;
            background: var(--color-accent);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* الجداول */
        .table-container {
            background: var(--color-secondary);
            border-radius: 1rem;
            border: 1px solid var(--color-border);
            overflow: hidden;
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            text-align: right;
            font-weight: 700;
            color: var(--color-text-muted);
            border-bottom: 1px solid var(--color-border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--color-border);
        }

        tr:last-child td { border-bottom: none; }

        /* النوافذ المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--color-secondary);
            padding: 2rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-lg);
        }

        .avatar-circle {
            width: 35px;
            height: 35px;
            background: var(--color-accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .nav-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body class="admin-body">
    <nav class="admin-nav">
        <div class="nav-container">
            <div class="nav-right">
                <img src="/assets/images/logo.png" alt="مدعوم" class="admin-logo">
                <span class="admin-title">لوحة الإدارة</span>
            </div>
            <div class="nav-left">
                <div id="adminBadgeContainer" style="display: none;">
                    <div class="admin-badge">
                        <svg viewBox="0 0 24 24" fill="currentColor" style="width: 14px; height: 14px;"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"></path></svg>
                        ADMIN
                    </div>
                </div>
                <div class="nav-actions">
                    <button id="themeToggle" class="nav-btn" title="تبديل المظهر">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
                    </button>
                    <div class="notifications-dropdown">
                        <button id="notifBtn" class="nav-btn" title="الإشعارات">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                            <span class="notif-badge" id="notifCount" style="display:none;">0</span>
                        </button>
                    </div>
                    <div class="user-profile-dropdown">
                        <button id="profileBtn" class="nav-btn" style="padding: 2px; border-radius: 50%;">
                            <div class="avatar-circle" id="adminInitial">A</div>
                            <img id="navAvatar" src="" class="nav-avatar" style="display: none;">
                        </button>
                    </div>
                    <button onclick="logout()" class="btn btn-danger btn-sm">خروج</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="admin-main" style="max-width: 1400px; margin: 0 auto; padding: 0 1.5rem;">
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="ticketsTab">إدارة التذاكر</button>
            <button class="tab-btn" data-tab="rewardsTab">إدارة المكافآت</button>
            <button class="tab-btn" data-tab="usersTab">المستخدمين</button>
            <button class="tab-btn" data-tab="bannedTab">المحظورين</button>
            <button class="tab-btn" data-tab="logsTab">سجل النشاطات</button>
            <button class="tab-btn" data-tab="profileTab">الملف الشخصي</button>
        </div>

        <!-- محتوى التبويبات (مختصر للحفاظ على الميزات) -->
        <div id="ticketsTab" class="tab-content active">
            <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                <div class="stat-card" style="background: var(--color-secondary); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--color-border);">
                    <p style="color: var(--color-text-muted); margin-bottom: 0.5rem;">إجمالي التذاكر</p>
                    <h2 id="admTotal" style="font-size: 2rem; font-weight: 800;">0</h2>
                </div>
                <div class="stat-card" style="background: var(--color-secondary); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--color-border);">
                    <p style="color: var(--color-text-muted); margin-bottom: 0.5rem;">المفتوحة</p>
                    <h2 id="admOpen" style="font-size: 2rem; font-weight: 800; color: var(--color-warning);">0</h2>
                </div>
                <div class="stat-card" style="background: var(--color-secondary); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--color-border);">
                    <p style="color: var(--color-text-muted); margin-bottom: 0.5rem;">المحلولة</p>
                    <h2 id="admResolved" style="font-size: 2rem; font-weight: 800; color: var(--color-success);">0</h2>
                </div>
            </div>
            <div class="table-container">
                <table><thead><tr><th>المستخدم</th><th>العنوان</th><th>الحالة</th><th>التاريخ</th><th>إجراءات</th></tr></thead><tbody id="admTicketsBody"></tbody></table>
            </div>
        </div>

        <div id="usersTab" class="tab-content" style="display:none;">
            <div class="table-container">
                <table><thead><tr><th>المستخدم</th><th>البريد</th><th>النقاط</th><th>الرتبة</th><th>تاريخ الانضمام</th><th>إجراءات</th></tr></thead><tbody id="usersTableBody"></tbody></table>
            </div>
        </div>

        <!-- باقي التبويبات تظهر برمجياً -->
        <div id="rewardsTab" class="tab-content" style="display:none;"><div class="table-container"><table><thead><tr><th>المستخدم</th><th>العنوان</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="reportsTableBody"></tbody></table></div></div>
        <div id="bannedTab" class="tab-content" style="display:none;"><div class="table-container"><table><thead><tr><th>المستخدم</th><th>البريد</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="bannedUsersBody"></tbody></table></div></div>
        <div id="logsTab" class="tab-content" style="display:none;"><div id="logsList" style="background: var(--color-secondary); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--color-border);"></div></div>
        <div id="profileTab" class="tab-content" style="display:none;">
            <div style="background: var(--color-secondary); padding: 2rem; border-radius: 1rem; border: 1px solid var(--color-border); max-width: 600px;">
                <h3>تعديل الملف الشخصي</h3>
                <form id="profileForm" style="margin-top: 1.5rem;">
                    <div class="form-group" style="margin-bottom: 1rem;"><label>الاسم الكامل</label><input type="text" id="profileFullName" class="form-control" style="width:100%; padding: 0.75rem; background: var(--color-primary); border: 1px solid var(--color-border); color: white; border-radius: 0.5rem;"></div>
                    <div class="form-group" style="margin-bottom: 1rem;"><label>رقم الهاتف</label><input type="tel" id="profilePhone" class="form-control" style="width:100%; padding: 0.75rem; background: var(--color-primary); border: 1px solid var(--color-border); color: white; border-radius: 0.5rem;"></div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">حفظ التغييرات</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div id="pointsModal" class="modal"><div class="modal-content"><h3>تعديل النقاط</h3><form id="pointsForm"><input type="hidden" id="pointsUserId"><div class="form-group"><label>النقاط الجديدة</label><input type="number" id="newPoints" class="form-control" style="width:100%; padding: 0.75rem; background: var(--color-primary); border: 1px solid var(--color-border); color: white; border-radius: 0.5rem;"></div><div style="display: flex; gap: 1rem; margin-top: 1.5rem;"><button type="button" class="btn btn-secondary" onclick="document.getElementById('pointsModal').classList.remove('active')">إلغاء</button><button type="submit" class="btn btn-primary">تحديث</button></div></form></div></div>
    <div id="roleModal" class="modal"><div class="modal-content"><h3>تعديل الرتبة</h3><form id="roleForm"><input type="hidden" id="roleUserId"><div class="form-group"><label>الرتبة الجديدة</label><select id="newRole" class="form-control" style="width:100%; padding: 0.75rem; background: var(--color-primary); border: 1px solid var(--color-border); color: white; border-radius: 0.5rem;"><option value="user">عضو (User)</option><option value="admin">إدارة (Admin)</option></select></div><div style="display: flex; gap: 1rem; margin-top: 1.5rem;"><button type="button" class="btn btn-secondary" onclick="document.getElementById('roleModal').classList.remove('active')">إلغاء</button><button type="submit" class="btn btn-primary">تحديث</button></div></form></div></div>

    <script type="module">
        import { supabase } from './api-config.js';
        import { requireAuth, logout, updateProfile, adminImpersonateUser, adminUpdateUserRole } from './auth-client.js';
        import { fetchTicketStats, subscribeToTickets } from './tickets-service.js';
        import { initAdminRewards } from './admin-rewards.js';
        
        let user = null;

        async function init() {
            setupEventListeners();
            try {
                user = await requireAuth('admin');
                if (!user) return window.location.replace('sign-in.html');
                updateUIWithUserData();
                renderTickets();
                renderUsers();
                renderBannedUsers();
                renderLogs();
                await initAdminRewards();
                subscribeToTickets(() => renderTickets());
            } catch (err) { window.location.replace('sign-in.html'); }
        }

        function updateUIWithUserData() {
            if (user) {
                const profile = user.profile || {};
                document.getElementById('adminInitial').textContent = (profile.full_name || user.email).charAt(0).toUpperCase();
                if (profile.role === 'admin') document.getElementById('adminBadgeContainer').style.display = 'block';
                if (profile.avatar_url) {
                    document.getElementById('navAvatar').src = profile.avatar_url;
                    document.getElementById('navAvatar').style.display = 'block';
                    document.getElementById('adminInitial').style.display = 'none';
                }
            }
        }

        async function renderTickets() {
            const body = document.getElementById('admTicketsBody');
            const { data: tickets } = await supabase.from('tickets').select('*, profiles(full_name, email)').order('created_at', { ascending: false });
            body.innerHTML = tickets?.map(t => `
                <tr>
                    <td>${t.profiles?.full_name || 'مستخدم'}</td>
                    <td>${t.title}</td>
                    <td><span class="status-badge status-${t.status}">${t.status}</span></td>
                    <td>${new Date(t.created_at).toLocaleDateString('ar-EG')}</td>
                    <td><button class="btn btn-primary btn-sm" onclick="impersonateUser('${t.user_id}')">دخول</button></td>
                </tr>
            `).join('') || '<tr><td colspan="5">لا توجد تذاكر</td></tr>';
            
            const stats = await fetchTicketStats();
            document.getElementById('admTotal').textContent = stats.total;
            document.getElementById('admOpen').textContent = stats.open;
            document.getElementById('admResolved').textContent = stats.resolved;
        }

        async function renderUsers() {
            const body = document.getElementById('usersTableBody');
            const { data: users } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
            body.innerHTML = users?.map(u => `
                <tr>
                    <td>${u.full_name || 'بدون اسم'}</td>
                    <td>${u.email}</td>
                    <td>${u.points || 0}</td>
                    <td>${u.role === 'admin' ? 'إدارة' : 'عضو'}</td>
                    <td>${new Date(u.created_at).toLocaleDateString('ar-EG')}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="openPointsModal('${u.id}', ${u.points || 0})">نقاط</button>
                        <button class="btn btn-primary btn-sm" onclick="openRoleModal('${u.id}', '${u.role || 'user'}')">رتبة</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="6">لا يوجد مستخدمين</td></tr>';
        }

        async function renderBannedUsers() {
            const body = document.getElementById('bannedUsersBody');
            const { data: users } = await supabase.from('profiles').select('*').neq('ban_status', 'none');
            body.innerHTML = users?.map(u => `
                <tr><td>${u.full_name}</td><td>${u.email}</td><td>${u.ban_status}</td><td>-</td></tr>
            `).join('') || '<tr><td colspan="4">لا يوجد محظورين</td></tr>';
        }

        async function renderLogs() {
            const list = document.getElementById('logsList');
            const { data: logs } = await supabase.from('activity_logs').select('*').order('created_at', { ascending: false }).limit(10);
            list.innerHTML = logs?.map(l => `<div style="padding:0.5rem; border-bottom:1px solid var(--color-border)"><strong>${l.action}</strong> - <small>${new Date(l.created_at).toLocaleString()}</small></div>`).join('') || 'لا توجد نشاطات';
        }

        function setupEventListeners() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).style.display = 'block';
                };
            });

            document.getElementById('pointsForm').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('pointsUserId').value;
                const points = parseInt(document.getElementById('newPoints').value);
                await supabase.from('profiles').update({ points }).eq('id', id);
                await supabase.from('user_wallets').upsert({ user_id: id, total_points: points, available_points: points });
                alert('تم التحديث');
                document.getElementById('pointsModal').classList.remove('active');
                renderUsers();
            };

            document.getElementById('roleForm').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('roleUserId').value;
                const role = document.getElementById('newRole').value;
                await adminUpdateUserRole(id, role);
                alert('تم التحديث');
                document.getElementById('roleModal').classList.remove('active');
                renderUsers();
            };
        }

        window.openPointsModal = (id, points) => {
            document.getElementById('pointsUserId').value = id;
            document.getElementById('newPoints').value = points;
            document.getElementById('pointsModal').classList.add('active');
        };

        window.openRoleModal = (id, role) => {
            document.getElementById('roleUserId').value = id;
            document.getElementById('newRole').value = role;
            document.getElementById('roleModal').classList.add('active');
        };

        window.impersonateUser = async (id) => { await adminImpersonateUser(id); };
        window.logout = async () => { await logout(); window.location.replace('sign-in.html'); };

        init();
    </script>
</body>
</html>
