<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="robot.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- مكتبات التصدير -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ==================== Admin Dashboard - Professional Blue Palette ==================== */
        :root {
            /* Base Color Palette - Professional Blue (Same as Customer Dashboard) */
            --color-primary: #003366;
            --color-primary-variant: #0055AA;
            --color-accent: #0077CC;
            --color-background: #F5F5F5;
            --color-surface: #FFFFFF;
            --color-text: #333333;
            --color-text-secondary: #777777;
            --color-muted: #EEEEEE;
            --color-success: #2E8A3A;
            --color-warning: #E0A800;
            --color-danger: #D9534F;
            --color-border: #DDDDDD;
            
            /* Computed Colors */
            --color-accent-hover: #0055AA;
            --color-accent-dark: #0055AA;
            --color-sidebar-bg: #002244;
            --color-sidebar-active: #0077CC;
            
            /* Shadows */
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 20px rgba(0, 119, 204, 0.2);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ==================== Navigation Bar ==================== */
        .admin-nav {
            background: var(--color-primary);
            border-bottom: 1px solid var(--color-border);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-right, .nav-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-logo {
            height: 35px !important;
            width: auto !important;
            object-fit: contain;
        }

        .admin-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: #FFFFFF;
        }

        /* ==================== Sidebar ==================== */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: var(--color-sidebar-bg);
            color: white;
            z-index: 2000;
            transition: all 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            display: none;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.active {
            display: block;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-close {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .sidebar-menu {
            padding: 1rem 0;
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 600;
            border-right: 4px solid transparent;
        }

        .sidebar-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
            border-right-color: var(--color-accent);
        }

        .sidebar-item.active {
            background: rgba(0, 119, 204, 0.15);
            color: white;
            border-right-color: var(--color-accent);
        }

        .sidebar-item svg {
            width: 20px;
            height: 20px;
        }

        /* ==================== Menu Toggle Button ==================== */
        .menu-toggle {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .menu-toggle:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }

        /* ==================== Admin Badge ==================== */
        .admin-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--color-warning), #FFD700);
            color: #000;
            padding: 0.35rem 0.85rem;
            border-radius: 2rem;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(224, 168, 0, 0.3);
            animation: adminPulse 2s infinite;
        }

        @keyframes adminPulse {
            0% { box-shadow: 0 0 0 0 rgba(224, 168, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(224, 168, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(224, 168, 0, 0); }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #FFFFFF;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #FFFFFF;
        }

        .notif-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--color-danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--color-primary);
            font-weight: bold;
            z-index: 10;
        }

        .avatar-circle {
            width: 35px;
            height: 35px;
            background: var(--color-accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .nav-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* ==================== Buttons ==================== */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--color-accent); color: #FFFFFF; }
        .btn-primary:hover { background: var(--color-accent-hover); box-shadow: var(--shadow-glow); }
        .btn-secondary { background: var(--color-muted); color: var(--color-text); border: 1px solid var(--color-border); }
        .btn-secondary:hover { background: var(--color-border); }
        .btn-danger { background: var(--color-danger); color: #FFFFFF; }
        .btn-danger:hover { background: #c9302c; }
        .btn-warning { background: var(--color-warning); color: #FFFFFF; }
        .btn-success { background: var(--color-success); color: #FFFFFF; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 0.4rem; }

        /* ==================== Tables ==================== */
        .table-container {
            background: var(--color-surface);
            border-radius: 1rem;
            border: 1px solid var(--color-border);
            overflow: hidden;
            margin-top: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--color-muted); padding: 1rem; text-align: right; font-weight: 700; color: var(--color-text); border-bottom: 1px solid var(--color-border); }
        td { padding: 1rem; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: var(--color-muted); }

        /* ==================== Stats Grid ==================== */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--color-surface); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--color-border); box-shadow: var(--shadow-sm); transition: all 0.3s; }
        .stat-card:hover { box-shadow: var(--shadow); border-color: var(--color-accent); }
        .stat-label { color: var(--color-text-secondary); margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600; }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--color-accent); }

        /* ==================== Modals ==================== */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--color-surface); padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 500px; border: 1px solid var(--color-border); box-shadow: var(--shadow-lg); }

        /* ==================== Forms ==================== */
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--color-text); }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: 0.5rem; font-family: 'Cairo', sans-serif; background: var(--color-surface); color: var(--color-text); font-size: 1rem; }
        .form-control:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(0, 119, 204, 0.1); }

        .admin-main {
            flex: 1;
            padding: 2rem 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-open { background: #FFF3CD; color: #856404; }
        .status-resolved { background: #D4EDDA; color: #155724; }
        .status-closed { background: #F8D7DA; color: #721C24; }

        .action-btns { display: flex; gap: 0.5rem; }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--color-text);
            text-decoration: none;
            transition: background 0.2s;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .menu-item:hover { background: var(--color-muted); }
        .menu-item svg { width: 18px; height: 18px; color: var(--color-text-secondary); }

        @media (max-width: 768px) {
            .nav-container { padding: 0 1rem; }
            .admin-title { display: none; }
            .system-status { display: none; }
        }
    </style>
</head>

    <main class="admin-main">
        <!-- Default Content: Tickets (as per original dashboard) -->
        <div id="ticketsTab" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">إجمالي التذاكر</p>
                    <h2 id="admTotal" class="stat-value">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">المفتوحة</p>
                    <h2 id="admOpen" class="stat-value" style="color: var(--color-warning);">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">المحلولة</p>
                    <h2 id="admResolved" class="stat-value" style="color: var(--color-success);">0</h2>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>الموضوع</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="admTicketsBody">
                        <tr><td colspan="5" style="text-align: center; padding: 2rem;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './api-config.js';
        import { requireAuth, logout, adminImpersonateUser } from './auth-client.js';
        import { fetchTicketStats, subscribeToTickets } from './tickets-service.js';
        
        let user = null;

        async function init() {
            setupSidebar();
            setupEventListeners();
            try {
                user = await requireAuth('admin');
                if (!user) return; 
                
                updateUIWithUserData();
                renderTickets();
                subscribeToTickets(() => renderTickets());
            } catch (err) {
                console.error('Init error:', err);
            }
        }

        function setupSidebar() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const sidebarClose = document.getElementById('sidebarClose');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            const toggleSidebar = () => {
                sidebar.classList.toggle('active');
                sidebarOverlay.classList.toggle('active');
            };

            menuToggle.addEventListener('click', toggleSidebar);
            sidebarClose.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);
        }

        function updateUIWithUserData() {
            if (user) {
                const profile = user.profile || {};
                document.getElementById('adminInitial').textContent = (profile.full_name || user.email).charAt(0).toUpperCase();
                if (profile.role === 'admin') document.getElementById('adminBadgeContainer').style.display = 'block';
                if (profile.avatar_url) {
                    const navAvatar = document.createElement('img');
                    navAvatar.src = profile.avatar_url;
                    navAvatar.className = 'nav-avatar';
                    document.getElementById('adminAvatarBtn').innerHTML = '';
                    document.getElementById('adminAvatarBtn').appendChild(navAvatar);
                }
            }
        }

        async function renderTickets() {
            const body = document.getElementById('admTicketsBody');
            const { data: tickets } = await supabase.from('tickets').select('*, profiles(full_name, email)').order('created_at', { ascending: false });
            body.innerHTML = tickets?.map(t => `
                <tr>
                    <td>${t.profiles?.full_name || 'مستخدم'}</td>
                    <td>${t.title}</td>
                    <td><span class="status-badge status-${t.status}">${t.status}</span></td>
                    <td>${new Date(t.created_at).toLocaleDateString('ar-EG')}</td>
                    <td><button class="btn btn-primary btn-sm" onclick="impersonateUser('${t.user_id}')">دخول</button></td>
                </tr>
            `).join('') || '<tr><td colspan="5">لا توجد تذاكر</td></tr>';
            
            const stats = await fetchTicketStats();
            document.getElementById('admTotal').textContent = stats.total;
            document.getElementById('admOpen').textContent = stats.open;
            document.getElementById('admResolved').textContent = stats.resolved;
        }

        function setupEventListeners() {
            const adminAvatarBtn = document.getElementById('adminAvatarBtn');
            const adminAvatarMenu = document.getElementById('adminAvatarMenu');
            
            if (adminAvatarBtn && adminAvatarMenu) {
                adminAvatarBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    adminAvatarMenu.style.display = adminAvatarMenu.style.display === 'block' ? 'none' : 'block';
                });
                
                document.addEventListener('click', () => {
                    adminAvatarMenu.style.display = 'none';
                });
            }

            const signoutAction = async (e) => {
                e.preventDefault();
                await logout();
                window.location.replace('sign-in.html');
            };

            document.getElementById('adminSignOut').addEventListener('click', signoutAction);
            document.getElementById('sidebarSignOut').addEventListener('click', signoutAction);
        }

        window.impersonateUser = async (id) => { 
            const { data: targetUser } = await supabase.from('profiles').select('email').eq('id', id).single();
            import('./activity-service.js').then(m => m.logActivity('impersonate', { target_user_id: id, target_email: targetUser?.email }));
            await adminImpersonateUser(id);
            location.href = 'customer-dashboard.html';
        };

        init();
    </script>
</body>
</html>
