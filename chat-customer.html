<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثة الفورية - منصة مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>/* ========== Layout Base ========== */
body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--chat-bg);
    margin: 0;
    height: 100vh;
    overflow: hidden;
}

.app-container {
    display: flex;
    height: 100vh;
    width: 100%;
}

.main-content {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    background: #f0f2f5;
    overflow: hidden;
}

/* ========== View Container ========== */
.view-container {
    flex-grow: 1;
    display: flex;
    padding: 2rem;
    justify-content: center;
    overflow: hidden;
}

/* ========== Chat Wrapper ========== */
.chat-wrapper {
    width: 100%;
    max-width: 900px;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* ========== Chat Sections ========== */
.chat-header-blue {
    background: #003366;
    color: white;
    padding: 1.25rem 2rem;
    flex-shrink: 0;
}

.chat-body {
    flex-grow: 1;
    overflow-y: auto;
    min-height: 0; /* ⭐ السطر الذهبي */
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.chat-footer {
    flex-shrink: 0;
    padding: 1.25rem 2rem;
    background: white;
    border-top: 1px solid #eee;
    display: flex;
    gap: 1rem;
    align-items: center;
}

/* ========== Input ========== */
.input-box {
    flex-grow: 1;
    border: 1px solid var(--color-border);
    padding: 0.8rem 1.5rem;
    border-radius: 2rem;
    outline: none;
    font-family: inherit;
    background: var(--color-surface);
    color: var(--color-text);
}

.input-box:focus {
    border-color: var(--color-accent);
}


    </style>
</head>
<body>
    <div class="app-container">
        <!-- Main Workspace -->
        <main class="main-content">
            <!-- Navbar -->
            <nav class="top-navbar">
                <div class="nav-logo-area">
                    <img src="/assets/images/logo.png" alt="Logo">
                    <span>منصة مدعوم</span>
                </div>
                <a href="/customer-dashboard.html" id="backLink" style="text-decoration: none; color: #666; font-weight: 600;">العودة للوحة التحكم</a>
            </nav>

            <!-- Chat Window View -->
            <div id="chat-window-view" class="view-container">
                <div class="chat-wrapper">
                    <div class="chat-header-blue">
                        <div class="bot-profile">
                            <div class="bot-avatar-circle">
                                <img src="/assets/images/mad3oom-robot.png" alt="Bot" id="chatHeaderImg">
                            </div>
                            <div>
                                <h3 style="margin: 0; font-size: 1.1rem;" id="chatHeaderName">بوت مدعوم الذكي</h3>
                                <span style="font-size: 0.8rem; opacity: 0.8;" id="chatHeaderStatus">متصل الآن - رد تلقائي</span>
                            </div>
                        </div>
                    </div>

                    <div class="chat-body" id="chatMessages">
                        <!-- Messages -->
                    </div>

                    <div id="typingIndicator" style="padding: 0.5rem 2rem; font-size: 0.8rem; color: #666; display: none;">جاري الرد...</div>

                    <div class="chat-footer">
                        <input type="text" class="input-box" placeholder="اكتب رسالتك هنا..." id="chatInput">
                        <button class="action-btn" id="sendBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(180deg);"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/assets/js/chat-logic.js"></script>
    <script>
        // Force bot test mode for customers
        window.isCustomerChat = true;
    </script>
</body>
</html>
